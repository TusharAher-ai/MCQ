hich are given below. (i) With the intention to expand, HSL has entered into a Share Purchase Agreement (\"SPA\") with the shareholders of FM Limited to purchase 30% stake in FM Limited as at Ist June, 20X2 at a price of = 30 per share. As per the terms of SPA, HSL has an option to purchase an additional 25% stake in FM Limited on or before 15th June, 20X2 at a price of % 30 per share. Similarly, the selling shareholder has an option to sell additional 25% stake in FM Limited on or before 15th June, 20X2 to HSL at a price of % 30 per share. The decisions on relevant activities of FM Limited are made in Annual General Meeting / Extraordinary General Meeting (AGM / EGM). A resolution in AGM / EGM is passed when more than 50% votes are cast in favour of the resolution. An AGM / EGM can be called by giving atleast 21 days advance notice to all shareholders. (ii) During the year, HSL issued Compulsory Convertible Debentures (\"CCDs\") on a private placement basis for % 100 lakh. Each CCD is convertible into 5 shares at the end of 4 years from the date of issue and an annual interest is payable at the rate of 6% p.a. At initial recognition, HSL recognized a liability component of compound instrument at % 20,79,063. HSL also incurred expenses of % 2,00,000 in connection with the issue of the instrument. Nature of expenses includes fees paid to legal advisors, registration and regulatory fees. (iii) HSL acquired a 40% stake in NM Limited as at Ist January, 20X2 for = 8,00,000 and classified the investment in NM Limited as an associate. As at Ist January, 20X2, the carrying amount and fair value of plant & equipment of NM Limited is = 3,00,000 and % 5,00,000 respectively with remaining useful life of 5 years (i.e. 20 quarters). From 1st January, 20X2 to 31st March, 20X2, NM Limited generated a profit of = 50,000.", "explanation": "As per para 10 of Ind AS 28, under the equity method, on initial recognition the investment in an associate or a joint venture is recognised at cost, and the carrying amount is increased or decreased to recognise the investor's share of the profit or loss of the investee after the date of acquisition. Accordingly, Cost of investment for 40% stake on acquisition date 8,00,000 Add: Share of post-acquisition profit and loss (50,000 x 40%) 20,000 Less: Share of post-acquisition loss due to additional depreciation [{(5,00,000 - 3,00,000)/20) x 40%] (%_ 4,000) % 8,16,000", "case_num": 15, "source": "RTP May 2024"}, {"q": "% 8,10,000 2. What shall be the accounting treatment of directly attributable expenses of % 2 lakh incurred in connection with the issue of Compulsory Convertible Debentures?", "options": ["Entire % 2,00,000 shall be recognized as expenses in the statement of profit and loss in the current year.", "Entire % 2,00,000 shall be reduced from equity in the current year.", "A proportion of % 1,58,419 shall be reduced from equity and Balance of & 41,581 shall be recognized as interest cost over the period of 4 years using effective interest method.", "Entire 2 2,00,000 shall be recognized as interest cost over the period of 4 years using effective interest method. 3. With more acquisitions, at the end of the year, HSL has investments in 2 subsidiaries, 3 associates and 1 joint venture. Which of the following statements is correct in relation to accounting of these investments in separate financial statements?"], "answer": 2, "context": "HS Limited (HSL) is a car manufacturing company. During the year, HSL has entered into many transactions, details of which are given below. (i) With the intention to expand, HSL has entered into a Share Purchase Agreement (\"SPA\") with the shareholders of FM Limited to purchase 30% stake in FM Limited as at Ist June, 20X2 at a price of = 30 per share. As per the terms of SPA, HSL has an option to purchase an additional 25% stake in FM Limited on or before 15th June, 20X2 at a price of % 30 per share. Similarly, the selling shareholder has an option to sell additional 25% stake in FM Limited on or before 15th June, 20X2 to HSL at a price of % 30 per share. The decisions on relevant activities of FM Limited are made in Annual General Meeting / Extraordinary General Meeting (AGM / EGM). A resolution in AGM / EGM is passed when more than 50% votes are cast in favour of the resolution. An AGM / EGM can be called by giving atleast 21 days advance notice to all shareholders. (ii) During the year, HSL issued Compulsory Convertible Debentures (\"CCDs\") on a private placement basis for % 100 lakh. Each CCD is convertible into 5 shares at the end of 4 years from the date of issue and an annual interest is payable at the rate of 6% p.a. At initial recognition, HSL recognized a liability component of compound instrument at % 20,79,063. HSL also incurred expenses of % 2,00,000 in connection with the issue of the instrument. Nature of expenses includes fees paid to legal advisors, registration and regulatory fees. (iii) HSL acquired a 40% stake in NM Limited as at Ist January, 20X2 for = 8,00,000 and classified the investment in NM Limited as an associate. As at Ist January, 20X2, the carrying amount and fair value of plant & equipment of NM Limited is = 3,00,000 and % 5,00,000 respectively with remaining useful life of 5 years (i.e. 20 quarters). From 1st January, 20X2 to 31st March, 20X2, NM Limited generated a profit of = 50,000.", "explanation": "Compulsory convertible debentures with annual interest payout is a compound financial instrument. As per the information given in the question the liability element to be initially recognised is % 20,79,063. Hence the equity element would be % 79,20,937 (1,00,00,000 - 20,79,063). Transaction cost of % 2,00,000 will be apportioned in equity and liability component in the ratio of 79,20,937 : 20,79,063, which would be as follows: Transaction cost attributable to equity = 2,00,000 x (79,20,937/ 1,00,00,000) = % 1,58,419 Transaction cost attributable to liability = 2,00,000 x (20,79,063/ 1,00,00,000) = % 41,581.", "case_num": 15, "source": "RTP May 2024"}, {"q": "Entire 2 2,00,000 shall be recognized as interest cost over the period of 4 years using effective interest method. 3. With more acquisitions, at the end of the year, HSL has investments in 2 subsidiaries, 3 associates and 1 joint venture. Which of the following statements is correct in relation to accounting of these investments in separate financial statements?", "options": ["HSL is required to measure all such investments at cost.", "HSL has an option to account for the investments in associates and joint ventures using the equity method of accounting and carry the investments in subsidiaries at cost.", "HSL has an option for each investment to measure either at cost or in accordance with Ind AS 109.", "HSL has an option to measure all such investments either at cost or in accordance with Ind AS 109. The option is available for each category of investments separately (i.e. subsidiaries, associates and joint venture). 4. With respect to the SPA entered by HSL, determine the date when HSL gained control over FM Limited."], "answer": 3, "context": "HS Limited (HSL) is a car manufacturing company. During the year, HSL has entered into many transactions, details of which are given below. (i) With the intention to expand, HSL has entered into a Share Purchase Agreement (\"SPA\") with the shareholders of FM Limited to purchase 30% stake in FM Limited as at Ist June, 20X2 at a price of = 30 per share. As per the terms of SPA, HSL has an option to purchase an additional 25% stake in FM Limited on or before 15th June, 20X2 at a price of % 30 per share. Similarly, the selling shareholder has an option to sell additional 25% stake in FM Limited on or before 15th June, 20X2 to HSL at a price of % 30 per share. The decisions on relevant activities of FM Limited are made in Annual General Meeting / Extraordinary General Meeting (AGM / EGM). A resolution in AGM / EGM is passed when more than 50% votes are cast in favour of the resolution. An AGM / EGM can be called by giving atleast 21 days advance notice to all shareholders. (ii) During the year, HSL issued Compulsory Convertible Debentures (\"CCDs\") on a private placement basis for % 100 lakh. Each CCD is convertible into 5 shares at the end of 4 years from the date of issue and an annual interest is payable at the rate of 6% p.a. At initial recognition, HSL recognized a liability component of compound instrument at % 20,79,063. HSL also incurred expenses of % 2,00,000 in connection with the issue of the instrument. Nature of expenses includes fees paid to legal advisors, registration and regulatory fees. (iii) HSL acquired a 40% stake in NM Limited as at Ist January, 20X2 for = 8,00,000 and classified the investment in NM Limited as an associate. As at Ist January, 20X2, the carrying amount and fair value of plant & equipment of NM Limited is = 3,00,000 and % 5,00,000 respectively with remaining useful life of 5 years (i.e. 20 quarters). From 1st January, 20X2 to 31st March, 20X2, NM Limited generated a profit of = 50,000.", "explanation": "As per para 10 of Ind AS 27, when an entity prepares separate financial statements, it shall account for investments in subsidiaries, joint ventures and associates either: (a) at cost, or (b) in accordance with Ind AS 109. The entity shall apply the same accounting for each category of investments. In the present case, investment in subsidiaries, associates and joint ventures are considered to be different categories of investments. Further, Ind AS 27 requires accounting for the investment in subsidiaries, joint ventures and associates either at cost, or in accordance with Ind AS 109 for each category of Investment. Thus, an entity can carry its investments in subsidiaries at cost and its investments in associates or joint ventures as financial assets in accordance with Ind AS 109 in its separate financial statements.", "case_num": 15, "source": "RTP May 2024"}, {"q": "HSL has an option to measure all such investments either at cost or in accordance with Ind AS 109. The option is available for each category of investments separately (i.e. subsidiaries, associates and joint venture). 4. With respect to the SPA entered by HSL, determine the date when HSL gained control over FM Limited.", "options": ["1st June, 20X2", "15th June, 20X2", "On the date of AGM/EGM", "On the date when the resolution for AGM/EGM is issued."], "answer": 0, "context": "HS Limited (HSL) is a car manufacturing company. During the year, HSL has entered into many transactions, details of which are given below. (i) With the intention to expand, HSL has entered into a Share Purchase Agreement (\"SPA\") with the shareholders of FM Limited to purchase 30% stake in FM Limited as at Ist June, 20X2 at a price of = 30 per share. As per the terms of SPA, HSL has an option to purchase an additional 25% stake in FM Limited on or before 15th June, 20X2 at a price of % 30 per share. Similarly, the selling shareholder has an option to sell additional 25% stake in FM Limited on or before 15th June, 20X2 to HSL at a price of % 30 per share. The decisions on relevant activities of FM Limited are made in Annual General Meeting / Extraordinary General Meeting (AGM / EGM). A resolution in AGM / EGM is passed when more than 50% votes are cast in favour of the resolution. An AGM / EGM can be called by giving atleast 21 days advance notice to all shareholders. (ii) During the year, HSL issued Compulsory Convertible Debentures (\"CCDs\") on a private placement basis for % 100 lakh. Each CCD is convertible into 5 shares at the end of 4 years from the date of issue and an annual interest is payable at the rate of 6% p.a. At initial recognition, HSL recognized a liability component of compound instrument at % 20,79,063. HSL also incurred expenses of % 2,00,000 in connection with the issue of the instrument. Nature of expenses includes fees paid to legal advisors, registration and regulatory fees. (iii) HSL a  can S Limited account for a hedge relationship for the purpose of preparing H Limited's consolidated financial statements?"], "answer": 3, "context": "NM Ltd. is an Ind AS compliant multinational company which is engaged in various businesses. On Ist April 20X1, NM Ltd. issues a new instrument with the following characteristics. e Face value 100, issue price 90. e Cumulative dividend payable at 5% per annum for 10 years. After 10 years, the dividend is payable at the discretion of the issuer. e The holder of the note has the option to convert to ordinary shares of NM Ltd. after 10 years, and conversion will be 10 ordinary shares for each instrument. e The holder can demand redemption for the face value at any time, with six months\u2019 notice up until the end of 10 years. After 10 years, redemption is at the discretion of the issuer. e There is no fixed maturity date. S Limited is a subsidiary of H Limited which is an associate of T Ltd. T Ltd. is an associate of NM Limited. S Limited's functional and presentation currency is INR, while the functional currency of its parent is USD and its presentation currency is EUR. S Limited has a firm commitment to buy a commodity in EUR. It has entered into a forward contract to hedge the firm commitment against foreign exchange risk. It has to prepare its financial statements for the purpose of consolidation with its parent. NM Limited is a huge machine manufacturer. It has to overhaul its machinery every 3 years. It has purchased machinery worth % 50,00,000. It is estimated that the overhaul costs will be = 5,00,000. It is expected that the machine has a useful life of 10 years.", "explanation": "The new instrument creates an obligation to deliver cash for 10 years. Such an obligation meets the definition of financial liability. Further the holder has the option to convert to 10 ordinary shares of NM Limited after 10 years. Thus, the instrument is convertible to fixed number of shares. Thus, the instrument meets the definit ry non-cumulative, non-redeemable preference shares (6% NCNRPS) that are subject to availability of distributable reserves. The directors of SEL can decide at each period end whether and the extent to which a dividend will be paid on the preference shares. The payment of dividends on SEL ordinary shares is also discretionary. The terms of the preference shares provide that if dividend is to be paid on SEL's ordinary shares, then a dividend must be paid on the preference shares;", "case_num": 24}, {"q": "Compound Financial Instruments 2. Whether 6% NCNRPS can be classified as:", "options": ["Equity in its entirety", "Liability in its entirety", "Either of the above with disclosure", "Compound Financial Instrument"], "answer": 0, "context": "Sun Enterprise Limited (SEL), whose functional currency FC is engaged in the business of manufacturing various items from metals. It prepares its financial statements as per Ind AS. It is considering raising funds for the expansion of its production capacity. However, its debt- equity ratio is under pressure. It has the following options before it: e SEL issues 6% cumulative, non-redeemable preference shares (6% CNRPS) with discretionary dividends that are subject to availability of distributable reserves. The directors of SEL can decide at each period end whether and the extent to which a dividend will be paid on the preference share. The terms of the preference shares provide that if no dividend is paid on the preference shares, then no dividend is paid on SEL ordinary shares; e SEL issues 6% discretionary non-cumulative, non-redeemable preference shares (6% NCNRPS) that are subject to availability of distributable reserves. The directors of SEL can decide at each period end whether and the extent to which a dividend will be paid on the preference shares. The payment of dividends on SEL ordinary shares is also discretionary. The terms of the preference shares provide that if dividend is to be paid on SEL's ordinary shares, then ng Date) 31st March, 20X6 Discount rate 12.00% Security deposit 10,00,000 Present value factor at the end of 5th year 0.567427 The accountant of the company is facing challenge in the accounting treatment of the above issues.", "explanation": "Reason for1&2 Para 47 of Ind AS 21 requires that goodwill arose on business combination as on 30th September, 20X1, shall be expressed in the functional currency of the foreign operation and shall be translated at the closing rate in accordance with paragraphs 39 and 42. In this case the amount of goodwill in EURO will be as follows: Net identifiable asset Dr. 23 million EURO Goodwill (bal. fig.) Dr. 1.4 million EURO To Bank 17.5 million EURO To NCI (23 x 30%) 6.9 million EURO Thus, goodwill on reporting date 31st March, 20X2 would be 1.4 million EURO x % 84 = & 117.6 million.", "case_num": 27}, {"q": "% 462 million 3. What will be the initial amount of prepaid lease payment in the lease contract to be recognised by G Ltd.?", "options": ["%5,67,427", "% 4,32,573", "%10,00,000", "Nil 4. What will be the amount of interest income on security deposit to be recognised in the financial statements of G Ltd. as on 31st March, 20X2?"], "answer": 1, "context": "G Ltd. (herein after referred as \u2018the Company\u2019) is currently engaged in different business segments and is also looking to expand its operations overseas. The Company is also exploring investment from an overseas investor to carry out the expansion plan. The functional currency of G Ltd. is Rupees. The Company is required to submit its financial statements for the year ended 31st March, 20X2 as per Ind AS. On 30th September, 20X1, the Company acquired 70% of the share capital of M Ltd., an entity registered as company in Germany. The fair value of the net assets of M Ltd. was 23 million EURO and the purchase consideration paid was 17.5 million EURO on 30th September, 20X1. The exchange rates as at 30th September, 20X1 was \u00a5 82 / EURO and at 31st March, 20X2 was % r annum. Following are the details of the deposit made by G Ltd.: Particulars Details Date of Security Deposit (Starting Date) 1st April, 20X1 Date of Security Deposit (Finishing Date) 31st March, 20X6 Discount rate 12.00% Security deposit 10,00,000 Present value factor at the end of 5th year 0.567427 The accountant of the company is facing challenge in the accounting treatment of the above issues.", "explanation": "Reason for3 &4 The security deposit is an interest free deposit redeemable at the end of lease term for % 10,00,000. Hence, this involves collection of contractual cash flows and shall be accounted at amortised cost. Upon Initial Measurement: Particulars Details Security deposit (A) 10,00,000 Total Lease Period (Years) 5 Discount rate 12.00% Present value factor of 5th year end 0.56743 Present value of deposit at beginning (B) 5,67,427 Prepaid lease payment at beginning (A-B) 4,32,573 This prepaid lease rent would be shown as ROU asset. Subsequently, every annual reporting year, interest income shall be accrued @ 12% per annum and prepaid expenses shall be amortised on straight line basis over the lease term. At the end of year 1, the interest @ 12% on security deposit will be recognised as income in the books. Accordingly, the interest income would be % 5,67,427 x 12% = & 68,091.", "case_num": 27}, {"q": "State which of the following is true for A Ltd. as per the requirements of Ind AS 1107", "options": ["Since A Ltd. is an unlisted entity, it is mandatory for it to prepare Consolidated Financial Statements (CFS)", "Even if X Ltd. does not object to A Ltd. for not preparing CFS, A Ltd. has to mandatory prepare CFS", "Even if A Ltd. is an unlisted entity and X Ltd. objects A Ltd. for not preparing CFS, A Ltd. is not required to prepare CFS", "Since A Ltd. is not a listed entity and if X Ltd. does not object to A Ltd. for not preparing CFS, A Ltd. will not be required to prepare CFS. 2. Assume the same facts as given in the scenario for wholly owned subsi of B Ltd at the end of 5 years. Such CCPS carry dividend @ 12% per annum, payable only when declared at the discretion of B Ltd.", "explanation": "B Ltd. has issued CCPS which provide for - (a) Conversion into fixed number of equity shares, i.e., one equity share for every CCPS (b) Non-cumulative dividends. Applying the definition of \u2018equity\u2019 under Ind AS 32 - (a) There is no contractual obligation to deliver cash or other financial asset. Dividends are payable only when declared and hence, at the discretion of the Issuer - B Ltd., thereby resulting in no contractual obligation over B Ltd. (b) Conversion is into a fixed number of equity shares. Hence, it meets definition of equity instrument and shall be classified as such in books of B Ltd.", "case_num": 34, "source": "MTP Nov 2024"}, {"q": "What is the fair value of the total consideration transferred by PQR Ltd. to XYZ Ltd.?", "options": ["% 34,000 crores", "% 33,850 crores", "% 33,000 crores", "25,000 crores 2. What is the amount of goodwill in the said business combination?"], "answer": 0, "context": "PQR Ltd. is required to adopt Ind AS from Ist April, 20X1, with comparatives for one year, i.e., for 20X0-20X1. On 1st April, 20X1, PQR Ltd. acquired 30% of the voting ordinary shares of XYZ Ltd. for \u00ae 8,000 crore. PQR Ltd. accounts its investment in XYZ Ltd. using equity method as prescribed under Ind AS 28. At 31st March, 20X2, PGR Ltd. recognised its share of the net asset changes of XYZ Ltd. using equity accounting as follows: (2 in crore) Share of profit or loss 700 Share of exchange difference in OCI 100 Share of revaluation reserve of PPE in OCI 50 The carrying amount of the investment in the associate on 31st March, 20X2 was therefore % 8,850 crore (8,000 + 700 + 100 + 50). On 1st April, 20X2, PQR Ltd. acquired the remaining 70% of XYZ Ltd. for cash % 25,000 crore. The following additional information is relevant at that date: (%_in crore) Fair value of the 30% interest already owned 9,000 F a Ltd. on 1st September, 2023. The legal counsel of the company has assessed the demand and opined that appeals may not be useful, and the appeal orders will be unfavourable to the joint arrangement. As per the terms of the joint operations agreement, out of % 100 crores (to be paid by Tara Ltd.), % 60 crores will be reimbursed by Zara Ltd. to Tara Ltd within three months from the date of any demand made in respect of joint operations by any government authorities. However, till the year end, actual reimbursement was not received from Zara Ltd. (ii) On 1st April, 2023, Tara Ltd. leased a machine from Dara Ltd. on a three year lease. The expected future economic life of the machine on Ist April, 2023 was eight years. If the machine breaks down, then under the terms of the lease, Dara Ltd would be required to repair the machine or provide a replacement. Dara Ltd agreed to allow Tara Ltd. to use the machine for the first six months of the lease without the payment of any rent as incentive to Tara Ltd. to sign the lease agreement. After this initial period, lease rentals of = 4,20,000 were payable six monthly in arrears, the first payment falling due on 31st March, 2024. (iii) Tara Ltd. has invested in debentures whose interest rate is floating in nature and as per terms of the instrument, interest will be reset every month. As per terms, rate of interest is MIBOR plus 2%. (iv) On Ist January, 2024, Tara Ltd. took a contract for installation of new elevator at a factory of its customer. The entity estimates the following with respect to the contract: Particulars Amount (\u00ae) Transaction price 30,00,000 Expected costs:", "options": ["Provision for = 40 crores and a contingent liability for = 60 crores.", "Contingent Liability for = 100 crores.", "Provision for % 60 crores and a contingent liability for = 40 crores.", "Provision for = 100 crores. . Classify the financial asset and determine the subsequent measurement for the aforesaid debenture instrument?"], "answer": <script>
(function(){
  "use strict";

  const STORAGE_KEY = "ca_final_progress_v1";
  const STATS_KEY = "ca_final_stats_v1";
  function loadProgress(){
    try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }catch(e){ return {}; }
  }
  function saveProgress(p){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); }catch(e){}
  }
  let progress = loadProgress();

  // ---------- global stats: xp, level, streaks ----------
  function loadStats(){
    try{
      return Object.assign({xp:0,bestStreak:0,daysPracticed:[],lastPracticeDate:null,soundOn:true}, JSON.parse(localStorage.getItem(STATS_KEY))||{});
    }catch(e){ return {xp:0,bestStreak:0,daysPracticed:[],lastPracticeDate:null,soundOn:true}; }
  }
  let stats = loadStats();
  function saveStats(){ try{ localStorage.setItem(STATS_KEY, JSON.stringify(stats)); }catch(e){} }

  function todayStr(){ return new Date().toISOString().slice(0,10); }
  function updateDailyStreak(){
    const today = todayStr();
    if(stats.lastPracticeDate === today) return;
    const y = new Date(Date.now()-86400000).toISOString().slice(0,10);
    if(stats.lastPracticeDate === y){
      stats.dayStreak = (stats.dayStreak||1)+1;
    } else {
      stats.dayStreak = 1;
    }
    stats.lastPracticeDate = today;
    saveStats();
  }

  function levelForXp(xp){ return Math.floor(Math.sqrt(xp/40))+1; }
  function xpForLevel(lvl){ return Math.pow(lvl-1,2)*40; }

  function addXp(amount){
    stats.xp = (stats.xp||0)+amount;
    saveStats();
  }

  // ---------- sound engine (synthesized, no external files) ----------
  let actx = null;
  function ac(){
    if(!stats.soundOn) return null;
    if(!actx){ try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return null; } }
    if(actx.state==="suspended") actx.resume();
    return actx;
  }
  function tone(freq, start, dur, type, vol, ctx){
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type||"sine";
    o.frequency.value = freq;
    g.gain.value = 0;
    o.connect(g); g.connect(ctx.destination);
    const t0 = ctx.currentTime+start;
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(vol||0.18, t0+0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    o.start(t0); o.stop(t0+dur+0.02);
  }
  function sndClick(){ const ctx=ac(); if(!ctx)return; tone(520,0,0.06,"sine",0.12,ctx); }
  function sndCorrect(streak){
    const ctx=ac(); if(!ctx)return;
    tone(660,0,0.11,"sine",0.16,ctx);
    tone(880,0.09,0.16,"sine",0.18,ctx);
    if(streak>0 && streak%5===0){ tone(1180,0.2,0.22,"triangle",0.16,ctx); }
    if(navigator.vibrate) navigator.vibrate(12);
  }
  function sndWrong(){
    const ctx=ac(); if(!ctx)return;
    tone(220,0,0.16,"sawtooth",0.12,ctx);
    tone(160,0.08,0.2,"sawtooth",0.1,ctx);
    if(navigator.vibrate) navigator.vibrate([15,30,15]);
  }
  function sndStreakMilestone(){
    const ctx=ac(); if(!ctx)return;
    [660,880,1100,1320].forEach((f,i)=>tone(f,i*0.09,0.18,"triangle",0.16,ctx));
  }
  function sndComplete(){
    const ctx=ac(); if(!ctx)return;
    [523,659,784,1046].forEach((f,i)=>tone(f,i*0.12,0.28,"sine",0.18,ctx));
  }
  window.__toggleSound = function(){
    stats.soundOn = !stats.soundOn;
    saveStats();
    render();
  };

  // ---------- toasts ----------
  function toast(msg){
    const wrap = document.getElementById("toast-wrap");
    const el = document.createElement("div");
    el.className="toast";
    el.textContent = msg;
    wrap.appendChild(el);
    setTimeout(()=>{ el.remove(); }, 2200);
  }

  // ---------- confetti ----------
  function confettiBurst(){
    const canvas = document.getElementById("confetti-canvas");
    const dpr = window.devicePixelRatio||1;
    canvas.width = innerWidth*dpr; canvas.height = innerHeight*dpr;
    canvas.style.width=innerWidth+"px"; canvas.style.height=innerHeight+"px";
    const ctx = canvas.getContext("2d");
    ctx.scale(dpr,dpr);
    const colors = ["#d4a24c","#f0c274","#3ecf8e","#4c78d4","#f4685f"];
    const N = 70;
    const parts = Array.from({length:N},()=>({
      x: innerWidth/2 + (Math.random()-0.5)*80,
      y: innerHeight*0.35,
      vx:(Math.random()-0.5)*9,
      vy:-Math.random()*7-3,
      size:4+Math.random()*4,
      rot:Math.random()*Math.PI*2,
      vr:(Math.random()-0.5)*0.3,
      color: colors[Math.floor(Math.random()*colors.length)],
      life:0
    }));
    let frame=0;
    function step(){
      frame++;
      ctx.clearRect(0,0,innerWidth,innerHeight);
      let alive=false;
      parts.forEach(p=>{
        p.vy += 0.22; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.life++;
        if(p.life<90){
          alive=true;
          ctx.save();
          ctx.translate(p.x,p.y); ctx.rotate(p.rot);
          ctx.fillStyle=p.color;
          ctx.globalAlpha = Math.max(0, 1-p.life/90);
          ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.6);
          ctx.restore();
        }
      });
      if(alive && frame<100) requestAnimationFrame(step);
      else ctx.clearRect(0,0,innerWidth,innerHeight);
    }
    step();
  }

  function progressKey(subj, chap, mode){ return subj+"|"+chap+"|"+mode; }
  function getEntry(subj, chap, mode){
    const k = progressKey(subj,chap,mode);
    return progress[k] || {idx:0, answers:{}, correct:0, completed:false};
  }
  function setEntry(subj, chap, mode, entry){
    progress[progressKey(subj,chap,mode)] = entry;
    saveProgress(progress);
  }

  // ---------- navigation state ----------
  let view = "home";
  let curSubject = null;
  let curChapter = null;
  let curMode = null;
  let quiz = null; // {questions, idx, answers, correct, streak}

  const app = document.getElementById("app");

  function render(){
    if(view==="home") return renderHome();
    if(view==="chapters") return renderChapters();
    if(view==="chapterDetail") return renderChapterDetail();
    if(view==="quiz") return renderQuiz();
    if(view==="summary") return renderSummary();
  }

  function topbar(title, sub, onBack){
    return `<header class="topbar">
      <div class="back" onclick="__back()">&#8592;</div>
      <div>
        <div class="title">${title}</div>
        ${sub? `<div class="sub">${sub}</div>`:""}
      </div>
      <div class="sound-toggle" onclick="__toggleSound()">${stats.soundOn? "&#128266;":"&#128263;"}</div>
    </header>`;
  }

  window.__back = function(){
    sndClick();
    if(view==="quiz"){ exitQuizToDetail(); return; }
    if(view==="summary"){ view="chapterDetail"; render(); return; }
    if(view==="chapterDetail"){ view="chapters"; render(); return; }
    if(view==="chapters"){ view="home"; curSubject=null; render(); return; }
  };

  // ---------- HOME ----------
  function renderHome(){
    const subs = GAME_DATA.subjects;
    const lvl = levelForXp(stats.xp||0);
    const curLevelXp = xpForLevel(lvl);
    const nextLevelXp = xpForLevel(lvl+1);
    const xpPct = Math.max(4,Math.round(((stats.xp-curLevelXp)/(nextLevelXp-curLevelXp))*100));
    app.innerHTML = `
      <main style="padding-top:6px;">
        <div class="hero">
          <div class="eyebrow">CA Final &middot; MCQ Trainer</div>
          <h1>Sharpen your recall,<br>one paper at a time.</h1>
          <p>Pick a subject to start practicing. Your place is saved automatically so you can pick up right where you left off.</p>
        </div>
        <div class="stats-bar">
          <div class="ledger stats-pill">
            <b>Lv ${lvl}</b><span>Level</span>
            <div class="xp-bar"><div class="fill" style="width:${xpPct}%"></div></div>
          </div>
          <div class="ledger stats-pill">
            <b>${stats.xp||0}</b><span>Total XP</span>
          </div>
          <div class="ledger stats-pill fire">
            <b>${stats.dayStreak||0}🔥</b><span>Day streak</span>
          </div>
          <div class="ledger stats-pill">
            <b>${stats.bestStreak||0}</b><span>Best streak</span>
          </div>
        </div>
        <div class="subject-grid">
          ${subs.map(s=>`
            <div class="ledger subject-card ${s.available?"":"locked"}" ${s.available?`onclick="__openSubject('${s.id}')"`:""}>
              <div class="ring"></div>
              <div class="code">${s.shortName}</div>
              <div class="name">${s.name}</div>
              <div class="stat">${s.available? chapterCountLabel(s) : "Content pending"}</div>
            </div>
          `).join("")}
        </div>
      </main>
    `;
  }
  function chapterCountLabel(s){
    const chapters = s.chapters.length;
    const totalQ = s.chapters.reduce((a,c)=>a+c.mcq.length,0);
    return `${chapters} chapters &middot; ${totalQ} MCQs`;
  }
  window.__openSubject = function(id){
    sndClick();
    curSubject = id; view="chapters"; render();
  };

  // ---------- CHAPTERS ----------
  function subjectObj(id){ return GAME_DATA.subjects.find(s=>s.id===id); }

  function renderChapters(){
    const subj = subjectObj(curSubject);
    app.innerHTML = `
      ${topbar(subj.name, subj.chapters.length+" chapters")}
      <main>
        ${subj.chapters.map((c,i)=>{
          const mcqEntry = getEntry(curSubject,c.id,"mcq");
          const total = c.mcq.length;
          const done = Object.keys(mcqEntry.answers||{}).length;
          const pct = total? Math.round(done/total*100):0;
          const isCase = c.isCaseScenarios;
          return `<div class="ledger chapter-row" onclick="__openChapter('${c.id}')">
            <div class="num">${isCase? '★' : (i+1).toString().padStart(2,'0')}</div>
            <div class="info">
              <div class="t">${c.title}${isCase?'<span class="case-badge">BONUS</span>':''}</div>
              <div class="m">${total} MCQs${done? ` &middot; ${done} attempted`:""}</div>
            </div>
            <div class="prog">
              ${ringSvg(pct)}
              <div class="pct">${pct}%</div>
            </div>
          </div>`;
        }).join("")}
      </main>
    `;
  }
  function ringSvg(pct){
    const r=14, c=2*Math.PI*r;
    const off = c - (pct/100)*c;
    return `<svg width="34" height="34" viewBox="0 0 34 34">
      <circle cx="17" cy="17" r="${r}" fill="none" stroke="rgba(212,162,76,0.15)" stroke-width="3"/>
      <circle cx="17" cy="17" r="${r}" fill="none" stroke="#d4a24c" stroke-width="3"
        stroke-dasharray="${c}" stroke-dashoffset="${off}" stroke-linecap="round"/>
    </svg>`;
  }
  window.__openChapter = function(id){
    sndClick();
    curChapter = id; view="chapterDetail"; render();
  };

  // ---------- CHAPTER DETAIL ----------
  function chapterObj(){
    return subjectObj(curSubject).chapters.find(c=>c.id===curChapter);
  }

  function modeCardHtml(mode, label, desc, count){
    const entry = getEntry(curSubject, curChapter, mode);
    const has = count>0;
    const done = Object.keys(entry.answers||{}).length;
    const resumable = has && done>0 && !entry.completed;
    let resumeHtml = "";
    if(has && done>0){
      if(entry.completed){
        resumeHtml = `<div class="resume-strip"><span>Completed &middot; scored ${entry.correct}/${count}</span>
          <button onclick="event.stopPropagation(); __startQuiz('${mode}', 0, true)">Retake</button></div>`;
      } else {
        resumeHtml = `<div class="resume-strip"><span>Resume from Q${entry.idx+1} of ${count}</span>
          <button onclick="event.stopPropagation(); __startQuiz('${mode}', ${entry.idx})">Resume</button></div>`;
      }
    }
    const jumpHtml = has? `<div class="jump-row" onclick="event.stopPropagation()">
        <input type="number" min="1" max="${count}" id="jump-${mode}" placeholder="#"/>
        <button onclick="__jumpTo('${mode}', ${count})">Jump to Q#</button>
      </div>` : "";
    return `<div class="ledger mode-card ${has?"":"disabled"}" ${has?`onclick="__startQuiz('${mode}', ${resumable?entry.idx:0})"`:""}>
      <div class="label">${label}</div>
      <div class="desc">${desc}</div>
      <div class="row">
        <div class="count">${count} question${count===1?"":"s"}</div>
        <div class="go">${has? (done>0? "Continue":"Start") : "Coming soon"}</div>
      </div>
      ${resumeHtml}
      ${jumpHtml}
    </div>`;
  }

  window.__jumpTo = function(mode, count){
    const inp = document.getElementById("jump-"+mode);
    let n = parseInt(inp.value,10);
    if(!n || n<1) n=1;
    if(n>count) n=count;
    __startQuiz(mode, n-1);
  };

  function renderChapterDetail(){
    const c = chapterObj();
    app.innerHTML = `
      ${topbar(c.title, subjectObj(curSubject).name)}
      <main>
        ${modeCardHtml("mcq","MCQs","Standalone multiple-choice questions"+(c.isCaseScenarios? " grouped by case scenario, with facts shown before each set.":".") , c.mcq.length)}
        ${modeCardHtml("qbank","Question Bank","Descriptive practice questions for this chapter.", c.qbank.length)}
      </main>
    `;
  }

  // ---------- QUIZ ----------
  window.__startQuiz = function(mode, startIdx, reset){
    curMode = mode;
    const c = chapterObj();
    const list = mode==="mcq" ? c.mcq : c.qbank;
    const entry = reset ? {idx:0, answers:{}, correct:0, completed:false} : getEntry(curSubject, curChapter, mode);
    if(reset) setEntry(curSubject, curChapter, mode, entry);
    quiz = {
      questions:list,
      idx: startIdx||0,
      answers: reset ? {} : (entry.answers||{}),
      correct: reset ? 0 : (entry.correct||0),
      streak:0,
      bestStreakSession:0,
      sessionXp:0
    };
    updateDailyStreak();
    view="quiz"; render();
  };

  function persistQuiz(completed){
    setEntry(curSubject, curChapter, curMode, {
      idx: quiz.idx,
      answers: quiz.answers,
      correct: quiz.correct,
      completed: !!completed
    });
  }
  function exitQuizToDetail(){
    persistQuiz(false);
    view="chapterDetail"; render();
  }

  function renderQuiz(){
    const total = quiz.questions.length;
    const q = quiz.questions[quiz.idx];
    const savedAns = quiz.answers[quiz.idx];
    const answered = savedAns!==undefined;
    const pct = Math.round(((quiz.idx)/total)*100);

    let contextHtml = "";
    if(q.context){
      contextHtml = `<div class="context-box"><span class="tag">Case ${q.case_num||""}${q.source? " &middot; "+q.source:""}</span>${escapeHtml(q.context)}</div>`;
    }

    const letters=["a","b","c","d"];
    const optionsHtml = q.options.map((opt,i)=>{
      let cls="option";
      if(answered){
        if(q.answer===i) cls+=" correct";
        else if(savedAns===i) cls+=" wrong";
        else cls+=" dim";
      }
      return `<div class="${cls}" ${answered?"":`onclick="__answer(${i})"`}>
        <div class="letter">${letters[i]}</div>
        <div>${escapeHtml(opt)}</div>
      </div>`;
    }).join("");

    let feedbackHtml = "";
    if(answered){
      if(q.answer===null || q.answer===undefined){
        feedbackHtml = `<div class="feedback unknown">Answer key unclear from source — please verify against your study material.</div>`;
      } else if(savedAns===q.answer){
        feedbackHtml = `<div class="feedback good">Correct.${q.explanation?`<div class="explain">${escapeHtml(q.explanation)}</div>`:""}</div>`;
      } else {
        feedbackHtml = `<div class="feedback bad">Not quite — correct answer is <b>${letters[q.answer]}</b>.${q.explanation?`<div class="explain">${escapeHtml(q.explanation)}</div>`:""}</div>`;
      }
    }

    app.innerHTML = `
      ${topbar(chapterObj().title, (curMode==="mcq"?"MCQ":"Question Bank")+" practice")}
      <main>
        <div class="quiz-top">
          <div class="quiz-progress-bar"><div class="fill" style="width:${pct}%"></div></div>
          <div class="quiz-meta">
            <span>Question ${quiz.idx+1} / ${total}</span>
            <span class="streak-chip ${quiz.streak>=5?'hot':''}">🔥 ${quiz.streak}</span>
          </div>
        </div>
        ${contextHtml}
        <div class="ledger q-card">
          <div class="qnum">Q${quiz.idx+1}</div>
          <div class="qtext">${escapeHtml(q.q)}</div>
          <div class="options">${optionsHtml}</div>
          ${feedbackHtml}
        </div>
        <div class="nextbar">
          ${answered?`<button class="btn-primary" onclick="__next()">${quiz.idx+1<total?"Next question":"Finish"}</button>`:""}
          <button class="btn-secondary" onclick="__exitQuiz()">Save &amp; exit to chapter</button>
        </div>
      </main>
    `;
  }

  window.__answer = function(i){
    const q = quiz.questions[quiz.idx];
    quiz.answers[quiz.idx]=i;
    const isCorrect = (q.answer!==null && q.answer!==undefined && i===q.answer);
    if(isCorrect){
      quiz.correct++; quiz.streak++;
      if(quiz.streak>quiz.bestStreakSession) quiz.bestStreakSession=quiz.streak;
      const bonus = Math.min(quiz.streak,5)*2;
      const gained = 10+bonus;
      quiz.sessionXp = (quiz.sessionXp||0)+gained;
      addXp(gained);
      sndCorrect(quiz.streak);
      if(quiz.streak > (stats.bestStreak||0)){
        stats.bestStreak = quiz.streak; saveStats();
      }
      if(quiz.streak>0 && quiz.streak%5===0){
        sndStreakMilestone();
        confettiBurst();
        toast(`🔥 ${quiz.streak} in a row! +${gained} XP`);
      } else {
        toast(`+${gained} XP`);
      }
    } else {
      quiz.streak=0;
      sndWrong();
    }
    persistQuiz(false);
    render();
  };
  window.__next = function(){
    if(quiz.idx+1 < quiz.questions.length){
      quiz.idx++;
      persistQuiz(false);
      render();
    } else {
      persistQuiz(true);
      sndComplete();
      confettiBurst();
      view="summary"; render();
    }
  };
  window.__exitQuiz = function(){ sndClick(); exitQuizToDetail(); };
  window.__retakeChapter = function(){ sndClick(); __startQuiz(curMode, 0, true); };
  window.__backToChapterDetail = function(){ sndClick(); view="chapterDetail"; render(); };

  // ---------- SUMMARY ----------
  function renderSummary(){
    const total = quiz.questions.length;
    const pct = total? Math.round((quiz.correct/total)*100):0;
    const r=60,c=2*Math.PI*r, off = c-(pct/100)*c;
    const praise = pct>=90? "Outstanding recall." : pct>=70? "Nicely done." : pct>=50? "Solid effort — a bit more polish." : "Good start — worth another pass.";
    app.innerHTML = `
      ${topbar(chapterObj().title, "Session complete")}
      <main>
        <div class="summary-hero">
          <div class="score-ring">
            <svg width="140" height="140" viewBox="0 0 140 140">
              <circle cx="70" cy="70" r="${r}" fill="none" stroke="rgba(212,162,76,0.12)" stroke-width="10"/>
              <circle cx="70" cy="70" r="${r}" fill="none" stroke="#d4a24c" stroke-width="10"
                stroke-dasharray="${c}" stroke-dashoffset="${off}" stroke-linecap="round"/>
            </svg>
            <div class="num"><b>${pct}%</b><span>score</span></div>
          </div>
          <h2>${praise}</h2>
          <p>You answered ${quiz.correct} of ${total} correctly &middot; earned <b style="color:var(--gold-bright)">+${quiz.sessionXp||0} XP</b></p>
          <div class="streak-badge-row">
            <div class="streak-badge">🔥 Best streak this session: ${quiz.bestStreakSession||0}</div>
            <div class="streak-badge">⭐ Level ${levelForXp(stats.xp||0)}</div>
          </div>
        </div>
        <div class="summary-stats">
          <div class="ledger cell"><b>${total}</b><span>Questions</span></div>
          <div class="ledger cell"><b>${quiz.correct}</b><span>Correct</span></div>
          <div class="ledger cell"><b>${total-quiz.correct}</b><span>To review</span></div>
        </div>
        <button class="btn-primary" onclick="__retakeChapter()">Retake chapter</button>
        <button class="btn-secondary" onclick="__backToChapterDetail()">Back to chapter</button>
      </main>
    `;
  }

  function escapeHtml(s){
    if(s===undefined||s===null) return "";
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  render();
})();
</script>
</body>
</html>

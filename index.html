<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CA Final Practice — MCQ Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0a0e1a;
    --surface:#111827;
    --surface2:#161f33;
    --line: rgba(212,162,76,0.16);
    --gold:#d4a24c;
    --gold-bright:#f0c274;
    --text:#eef1f6;
    --text-dim:#8b93a7;
    --good:#3ecf8e;
    --bad:#f4685f;
    --radius: 14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(212,162,76,0.10), transparent 60%),
      radial-gradient(900px 500px at 100% 0%, rgba(76,120,212,0.10), transparent 55%),
      var(--ink);
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .display{font-family:'Fraunces',serif;}
  .mono{font-family:'JetBrains Mono',monospace;}
  #app{max-width:640px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding-bottom:24px;}

  /* Ledger texture - signature element: a ruled margin like accounting paper */
  .ledger{
    position:relative;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
  }
  .ledger::before{
    content:"";
    position:absolute; left:34px; top:0; bottom:0; width:1px;
    background:rgba(244,104,95,0.25);
  }

  header.topbar{
    display:flex;align-items:center;gap:12px;
    padding:18px 20px 14px;
    position:sticky;top:0;z-index:20;
    background:linear-gradient(var(--ink) 78%, transparent);
  }
  header.topbar .back{
    width:36px;height:36px;border-radius:10px;border:1px solid var(--line);
    background:var(--surface2);color:var(--gold-bright);
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    font-size:18px;flex-shrink:0;
  }
  header.topbar .title{font-family:'Fraunces',serif;font-weight:600;font-size:17px;letter-spacing:.2px;}
  header.topbar .sub{font-size:12px;color:var(--text-dim);margin-top:1px;}

  main{flex:1;padding:0 20px;}

  /* HOME */
  .hero{padding:22px 4px 26px;}
  .hero .eyebrow{
    font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);
    font-weight:700;margin-bottom:8px;
  }
  .hero h1{font-family:'Fraunces',serif;font-size:30px;line-height:1.15;margin:0 0 8px;font-weight:600;}
  .hero p{color:var(--text-dim);font-size:14.5px;margin:0;max-width:46ch;}

  .subject-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px;}
  .subject-card{
    padding:18px 16px;cursor:pointer;transition:transform .15s ease, border-color .15s ease;
    position:relative; overflow:hidden;
  }
  .subject-card:active{transform:scale(0.97);}
  .subject-card .code{
    font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;color:var(--gold);
    letter-spacing:.04em;
  }
  .subject-card .name{font-size:13.5px;color:var(--text);margin-top:6px;line-height:1.3;font-weight:500;}
  .subject-card .stat{margin-top:14px;font-size:11px;color:var(--text-dim);}
  .subject-card.locked{opacity:0.45;cursor:default;}
  .subject-card.locked::after{
    content:"Coming soon";
    position:absolute;top:12px;right:12px;font-size:9.5px;color:var(--text-dim);
    border:1px solid var(--line);padding:2px 7px;border-radius:20px;
  }
  .subject-card .ring{
    position:absolute;right:-16px;bottom:-16px;width:70px;height:70px;border-radius:50%;
    border:10px solid rgba(212,162,76,0.08);
  }

  /* CHAPTER LIST */
  .chapter-row{
    display:flex;align-items:center;gap:14px;padding:14px 16px;margin-bottom:9px;cursor:pointer;
  }
  .chapter-row .num{
    font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--gold);
    width:28px;flex-shrink:0;
  }
  .chapter-row .info{flex:1;min-width:0;}
  .chapter-row .t{font-size:14px;font-weight:600;color:var(--text);line-height:1.3;}
  .chapter-row .m{font-size:11.5px;color:var(--text-dim);margin-top:3px;}
  .chapter-row .prog{width:34px;height:34px;flex-shrink:0;position:relative;}
  .chapter-row .prog svg{transform:rotate(-90deg);}
  .chapter-row .prog .pct{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:9px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;
  }
  .case-badge{
    display:inline-block;font-size:9.5px;color:var(--ink);background:var(--gold);
    padding:2px 7px;border-radius:20px;font-weight:700;margin-left:6px;letter-spacing:.02em;
  }

  /* CHAPTER DETAIL */
  .mode-card{
    padding:20px;margin-bottom:14px;cursor:pointer;position:relative;
  }
  .mode-card .label{font-family:'Fraunces',serif;font-size:19px;font-weight:600;margin-bottom:4px;}
  .mode-card .desc{font-size:13px;color:var(--text-dim);margin-bottom:14px;}
  .mode-card .row{display:flex;justify-content:space-between;align-items:center;}
  .mode-card .count{font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--gold);}
  .mode-card .go{
    font-size:12.5px;font-weight:700;color:var(--ink);background:var(--gold);
    padding:8px 16px;border-radius:9px;
  }
  .mode-card.disabled{opacity:0.4;cursor:default;}
  .mode-card.disabled .go{background:var(--surface2);color:var(--text-dim);}
  .resume-strip{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    font-size:12px;color:var(--text-dim);margin-top:10px;padding-top:12px;
    border-top:1px dashed var(--line);
  }
  .resume-strip button{
    background:none;border:1px solid var(--line);color:var(--gold-bright);
    font-size:11.5px;padding:5px 10px;border-radius:7px;cursor:pointer;
  }
  .jump-row{display:flex;gap:8px;margin-top:10px;}
  .jump-row input{
    width:64px;background:var(--surface2);border:1px solid var(--line);color:var(--text);
    border-radius:8px;padding:7px 8px;font-family:'JetBrains Mono',monospace;font-size:13px;text-align:center;
  }
  .jump-row button{
    background:var(--surface2);border:1px solid var(--line);color:var(--text);
    border-radius:8px;padding:7px 12px;font-size:12px;cursor:pointer;
  }

  /* QUIZ */
  .quiz-top{padding:10px 4px 4px;}
  .quiz-progress-bar{height:5px;background:var(--surface2);border-radius:20px;overflow:hidden;margin-bottom:10px;}
  .quiz-progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-bright));transition:width .3s ease;}
  .quiz-meta{display:flex;justify-content:space-between;font-size:11.5px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;}
  .streak-chip{
    display:inline-flex;align-items:center;gap:4px;background:var(--surface2);
    padding:3px 9px;border-radius:20px;font-size:11px;color:var(--gold-bright);border:1px solid var(--line);
  }

  .context-box{
    padding:14px 16px;margin:14px 0 4px;font-size:13px;line-height:1.55;color:var(--text-dim);
    border-left:3px solid var(--gold);background:var(--surface2);border-radius:10px;
  }
  .context-box .tag{font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:6px;display:block;}

  .q-card{padding:22px 18px;margin:14px 0;}
  .q-card .qnum{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--gold);margin-bottom:8px;}
  .q-card .qtext{font-size:16px;line-height:1.5;font-weight:500;color:var(--text);}

  .options{display:flex;flex-direction:column;gap:10px;margin-top:16px;}
  .option{
    display:flex;gap:12px;align-items:flex-start;padding:13px 14px;
    background:var(--surface2);border:1px solid var(--line);border-radius:11px;
    cursor:pointer;font-size:14px;line-height:1.45;transition:border-color .15s, background .15s;
  }
  .option:active{transform:scale(0.99);}
  .option .letter{
    font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;color:var(--gold);
    width:20px;height:20px;border-radius:6px;border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;
  }
  .option.correct{border-color:var(--good);background:rgba(62,207,142,0.08);}
  .option.correct .letter{background:var(--good);color:var(--ink);border-color:var(--good);}
  .option.wrong{border-color:var(--bad);background:rgba(244,104,95,0.08);}
  .option.wrong .letter{background:var(--bad);color:var(--ink);border-color:var(--bad);}
  .option.dim{opacity:0.5;}

  .feedback{
    margin-top:14px;padding:13px 15px;border-radius:11px;font-size:13px;line-height:1.55;
  }
  .feedback.good{background:rgba(62,207,142,0.09);border:1px solid rgba(62,207,142,0.3);color:#a9ecc9;}
  .feedback.bad{background:rgba(244,104,95,0.09);border:1px solid rgba(244,104,95,0.3);color:#f7bcb8;}
  .feedback.unknown{background:var(--surface2);border:1px solid var(--line);color:var(--text-dim);}
  .feedback .explain{margin-top:8px;color:var(--text-dim);font-size:12.5px;}

  .nextbar{position:sticky;bottom:0;padding:14px 0 6px;background:linear-gradient(transparent, var(--ink) 30%);}
  .btn-primary{
    width:100%;padding:14px;border:none;border-radius:12px;background:var(--gold);
    color:var(--ink);font-weight:700;font-size:15px;cursor:pointer;font-family:'Inter',sans-serif;
  }
  .btn-primary:active{transform:scale(0.98);}
  .btn-secondary{
    width:100%;padding:13px;border:1px solid var(--line);border-radius:12px;background:transparent;
    color:var(--text);font-weight:600;font-size:14px;cursor:pointer;margin-top:9px;
  }

  /* SUMMARY */
  .summary-hero{text-align:center;padding:34px 10px 20px;}
  .summary-hero .score-ring{width:140px;height:140px;margin:0 auto 18px;position:relative;}
  .summary-hero .score-ring svg{transform:rotate(-90deg);}
  .summary-hero .score-ring .num{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  }
  .summary-hero .score-ring .num b{font-family:'Fraunces',serif;font-size:32px;}
  .summary-hero .score-ring .num span{font-size:11px;color:var(--text-dim);}
  .summary-hero h2{font-family:'Fraunces',serif;font-size:22px;margin:0 0 6px;}
  .summary-hero p{color:var(--text-dim);font-size:13.5px;}
  .summary-stats{display:flex;gap:10px;margin:20px 0;}
  .summary-stats .cell{flex:1;padding:14px 8px;text-align:center;}
  .summary-stats .cell b{display:block;font-family:'JetBrains Mono',monospace;font-size:18px;color:var(--gold-bright);}
  .summary-stats .cell span{font-size:10.5px;color:var(--text-dim);}

  .empty-state{text-align:center;padding:50px 20px;color:var(--text-dim);}
  .empty-state .icon{font-size:34px;margin-bottom:12px;}

  /* ---- Engagement layer ---- */
  .stats-bar{
    display:flex;gap:8px;margin:2px 0 18px;
  }
  .stats-pill{
    flex:1;padding:10px 8px;text-align:center;position:relative;
  }
  .stats-pill b{display:block;font-family:'JetBrains Mono',monospace;font-size:16px;color:var(--gold-bright);line-height:1.2;}
  .stats-pill span{font-size:9.5px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;}
  .stats-pill.fire b{color:#ff9d5c;}
  .xp-bar{height:4px;background:var(--surface2);border-radius:20px;overflow:hidden;margin-top:6px;}
  .xp-bar .fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-bright));}

  .sound-toggle{
    margin-left:auto;width:36px;height:36px;border-radius:10px;border:1px solid var(--line);
    background:var(--surface2);color:var(--text-dim);display:flex;align-items:center;justify-content:center;
    cursor:pointer;font-size:15px;flex-shrink:0;
  }

  @keyframes shake{
    10%,90%{transform:translateX(-1px);}
    20%,80%{transform:translateX(2px);}
    30%,50%,70%{transform:translateX(-4px);}
    40%,60%{transform:translateX(4px);}
  }
  .option.wrong{animation:shake .45s;}
  @keyframes popIn{
    0%{transform:scale(0.94);opacity:0;}
    100%{transform:scale(1);opacity:1;}
  }
  .q-card{animation:popIn .25s ease;}
  @keyframes pulseGood{
    0%{box-shadow:0 0 0 0 rgba(62,207,142,0.45);}
    100%{box-shadow:0 0 0 14px rgba(62,207,142,0);}
  }
  .option.correct{animation:pulseGood .6s ease-out;}
  @keyframes flicker{
    0%,100%{transform:scale(1) rotate(-2deg);}
    50%{transform:scale(1.12) rotate(2deg);}
  }
  .streak-chip.hot{animation:flicker .5s ease-in-out infinite;}

  #toast-wrap{
    position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:200;
    display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;
    width:100%;max-width:640px;padding:0 20px;
  }
  .toast{
    background:var(--surface2);border:1px solid var(--gold);color:var(--gold-bright);
    padding:10px 18px;border-radius:30px;font-size:13px;font-weight:700;
    box-shadow:0 8px 24px rgba(0,0,0,0.4);
    animation:toastIn .3s ease, toastOut .35s ease 1.8s forwards;
    white-space:nowrap;
  }
  @keyframes toastIn{from{opacity:0;transform:translateY(-14px);} to{opacity:1;transform:translateY(0);}}
  @keyframes toastOut{to{opacity:0;transform:translateY(-14px);}}

  #confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:150;}

  .streak-badge-row{display:flex;gap:8px;justify-content:center;margin-top:14px;}
  .streak-badge{
    font-size:11px;color:var(--gold-bright);background:var(--surface2);border:1px solid var(--line);
    padding:6px 12px;border-radius:20px;font-weight:600;
  }

  ::selection{background:rgba(212,162,76,0.3);}
</style>
</head>

<div id="toast-wrap"></div>
<canvas id="confetti-canvas"></canvas>

ugh Ist April, 20X1 1,50,000 | Specific 1,50,000 x 9% x 10/12 11,250 borrowing 1st August, 20X1 2,00,000 | Specific 50,000 x 9% x 10/12 3,750 borrowing General 1,50,000 x 11.4375% x 6/12 8,578.125 borrowing 1st October, 20X1 3,50,000 | General 3,50,000 x 11.4375% x 4/12 13,343.75 borrowing Ist January, 20X2 1,00,000 |General 1,00,000 x 11.4375% x 1/12 953.125 borrowing 37,875", "case_num": 3, "source": "MTP Nov 2024"}, {"q": "What is the relationship of Z Ltd. with H Ltd.?", "options": ["ZLtd. is a subsidiary of H Ltd.", "ZLtd. is an associate of H Ltd.", "ZLtd. is in joint arrangement with H Ltd.", "HLtd. has invested in Z Ltd. with no further relationship as subsidiary, associate or joint arrangement. 2. What is the relationship of G Ltd. with H Ltd.?"], "answer": 1, "context": "H Ltd. is a globally diversified business conglomerate with operations spanning multiple business segments across various regions worldwide. For maintaining its financial records, the company follows Indian Accounting Standards. As the finance team diligently finalizes the books of accounts and prepares the financial statements for the financial year ending on 31st March 20X2, it requires insights and accounting suggestions on the following transactions: (i) H Ltd. holds 12% of the voting shares in Z Ltd. Z Ltd.'s board comprises of eight members and two of these members are appointed by H Ltd. casting significant influence. Each board member has one vote at the meeting. (ii) H Ltd. holds 10% of the voting power of G Ltd. The balance 90% voting power is held by nine other investors each holding 10%. The decisions about the relevant activities (except decision about taking borrowings) of G Ltd. are taken by the members holding majority of the voting power. The decisions about taking borrowings are required to be taken by unanimous consent of all the investors. Further, decisions about taking borrowing are not the decisions that most significantly affect the returns of G Ltd. (iii) H Ltd. is also engaged in the business of pharmaceuticals. It has invested in the share capital of Y Ltd. and is holding 15% of Y Ltd.'s total voting power. Y Ltd. is engaged in the business of producing packing materials for pharmaceutical entities. One of the incentives for H Ltd. to invest in Y Ltd. was the fact that Y Ltd. is engaged in the business of producing packing materials which is also useful for H Ltd. Since last many years, almost 90% of the output of Y Ltd. is procured by H Ltd.", "explanation": "Z Ltd is an associate of H Ltd as significant influence is demonstrated by the presence of directors on the board and the relative voting rights at meetings.", "case_num": 4, "source": "MTP Nov 2024"}, {"q": "HLtd. has invested in Z Ltd. with no further relationship as subsidiary, associate or joint arrangement. 2. What is the relationship of G Ltd. with H Ltd.?", "options": ["G Ltd. is a subsidiary of H Ltd.", "G Ltd. is an associate of H Ltd.", "G_Ltd. is in joint arrangement with H Ltd.", "HLtd. has invested in G Ltd. with no further relationship as subsidiary, associate or joint arrangement. 3. What is the relationship of Y Ltd. with H Ltd.?"], "answer": 1, "context": "H Ltd. is a globally diversified business conglomerate with operations spanning multiple business segments across various regions worldwide. For maintaining its financial records, the company follows Indian Accounting Standards. As the finance team diligently finalizes the books of accounts and prepares the financial statements for the financial year ending on 31st March 20X2, it requires insights and accounting suggestions on the following transactions: (i) H Ltd. holds 12% of the voting shares in Z Ltd. Z Ltd.'s board comprises of eight members and two of these members are appointed by H Ltd. casting significant influence. Each board member has one vote at the meeting. (ii) H Ltd. holds 10% of the voting power of G Ltd. The balance 90% voting power is held by nine other investors each holding 10%.  regions worldwide. For maintaining its financial records, the company follows Indian Accounting Standards. As the finance team diligently finalizes the books of accounts and prepares the financial statements for the financial year ending on 31st March 20X2, it requires insights and accounting suggestions on the following transactions: (i) H Ltd. holds 12% of the voting shares in Z Ltd. Z Ltd.'s board comprises of eight members and two of these members are appointed by H Ltd. casting significant influence. Each board member has one vote at the meeting. (ii) H Ltd. holds 10% of the voting power of G Ltd. The balance 90% voting power is held by nine other investors each holding 10%. The decisions about the relevant activities (except decision about taking borrowings) of G Ltd. are taken by the members holding majority of the voting power. The decisions about taking borrowings are required to be taken by unanimous consent of all the investors. Further, decisions about taking borrowing are not the decisions that most significantly affect the returns of G Ltd. (iii) H Ltd. is also engaged in the business of pharmaceuticals. It has invested in the share capital of Y Ltd. and is holding 15% of Y Ltd.'s total voting power. Y Ltd. is engaged in the business of producing packing materials for pharmaceutical entities. One of the incentives for H Ltd. to invest in Y Ltd. was the fact that Y Ltd. is engaged in the business of producing packing materials which is also useful for H Ltd. Since last many years, almost 90% of the output of Y Ltd. is procured by H Ltd.", "explanation": "Since 90% of the output of Y Ltd. is procured by H Ltd., Y Ltd. would be dependent on H Ltd. for the continuation of its business. Hence, even though H Ltd. holds only 15% of the voting power of Y Ltd. it has significant influence over Y Ltd.", "case_num": 4, "source": "MTP Nov 2024"}, {"q": "%11,84,000 2. With respect to point (a), determine defer tax on property, plant and equipment for the year 20X4 areholder's equity 300 355 (ii) A Limited also operates in the travel industry and incurs costs unevenly through the financial year. Advertising costs of = 40 lakhs were incurred on Ist July 20X2, and staff bonuses are paid at year-end based on sales. Staff bonuses are expected to be around & 400 lakhs for the year; of that a sum of % 60 lakhs would relate to the period ending 30th September 20X2. (iii) An item of equipment X was acquired by A Ltd. on Ist April 20X1 for % 1,00,000 having an estimated useful life of 10 years, with a residual value of zero. The asset is depreciated ona straight-line basis. The asset was revalued to % 1,04,000 on 31st March 20X3. (iv) A Ltd. has spent % 15,00,000 in developing a new product during the year ended 31st March,20X3. The development costs incurred were recognized as an Intangible Assets as per Ind AS 38. For the purpose of computing the taxable income, these expenses are allowable in full in the year of computing the taxable income, these expenses are allowable in full in the year of incurring the expenses. At the year end, the company recognized an impairment loss of = 75,000 against the intangible asset. (v) The company has issued preference shares that are redeemable at the option of the holder. Three months before the end of the year, it was probable that the holders would require redemption.", "explanation": "Under Ind AS 32, the redeemable preference shares are classified as a liability from the date of issue because the holder has the right to demand redemption. Therefore, the instruments are a liability and the payment for the year is classified as interest. The probability of conversion makes no difference to the classification of the instruments.", "case_num": 8, "source": "MTP May 2024"}, {"q": "With respect to a joint operation engaged in the business of mining precious metals, how will the liability be disclosed in the books of U Ltd.?", "options": ["Provision for = 20 crores and a contingent liability for = 30 crores", "Contingent liability for % 50 crores", "Provision for % 30 crores and a contingent liability for = 20 crores", "Provision for % 50 crores. 2. What is the amount of preference dividend to be reduced from profit or loss for the year for calculating Basic Earnings Per Share?"], "answer": 3, "context": "U Ltd. is engaged in mining and many other industries and prepares its financial statements following Indian Accounting Standards and follows April-March as their financial year. During the year 20X2-20X3, the company has faced some issues and for their solution seeks your professional advice. (i) ULtd. and F Ltd. are partners of a joint operation engaged in the business of mining precious metals. The entity uses a jointly owned drilling plant in its operations. During the year ended 31st March 20X3, an inspection was conducted by the government authorities in the mining fields. The inspection authorities concluded that adequate safety measures were not followed by the entity. As a consequence, a case was filed and a penalty of = 50 crores has been demanded from U Ltd. The legal counsel of the company has assessed the demand and opined that appeals may not be useful, and the appeal orders will be unfavourable to the joint arrangement. Out of = 50 crores (to be paid by U Ltd.), \u00a5 30 crore will be reimbursed by F Ltd. Later, as per the terms of the Joint Operation Agreement. At the year end, actual reimbursement was not received from F Ltd. (ii) U Ltd. has issued 10,00,000, 9% cumulative preference shares. The Company has arrears of % 15 crores of preference dividend as on 31st March 20X3, it includes current year arrears of % 1.75 crores. The Company did not declare any dividend for equity shareholders. Further U Ltd. has also issued certain optionally convertible debentures, which are outstanding as at the year end. (iii) On Ist January 20X3, U Ltd. acquired 30% of the shares of T Ltd. The investment was accounted for as an associate in U Ltd.'s consolidated financial statements. Both U Ltd. and T Ltd. have an accounting year end of 31st March 20X3. U Ltd. has no other investments in associates. Net profit for the year in T Ltd.'s income statement for the year ended 31st March 20X3 was \u00ae 0.23 crores. It declared and paid dividend of % 0.1 crore on Ist March 20X3. No other dividends were paid in the year. (iv) On Ist January, 20X3, U Ltd. also acquired a 60% stake in S Ltd. The cash consideration payable was 1 crore to be paid immediately, and % 1.21 crores after two years. The fair value of net assets of S Ltd. at acquisition date was % 3 crores. U Ltd. has calculated that its cost of capital is 10%. Non-controlling interest is measured at the proportionate share of identifiable net assets.", "explanation": "As per Ind AS 37, 'Provisions, Contingent Liabilities and Contingent Assets\u2019, when some or all of the expenditure required to settle a provision is expected to be reimbursed by another party, the reimbursement shall be recognized when, and only when, it is virtually certain that reimbursement will be received if the entity settles the obligation. The reimbursement shall be treated as a separate asset. The amount recognized for the reimbursement shall not exceed the amount of the provision. In the statement of profit and loss, the expense relating to a provision may be presented net of the amount recognized for a reimbursement. In the given case, U Ltd. will record provision by % 50 crores in its books and % 30 crores will be reimbursed by F Ltd. Hence % 50 crore will be recognized as provision and % 30 crore is disclosed as a contingent asset, if it is virtually certain that reimbursement will be received if the entity settles the obligation.", "case_num": 9, "source": "MTP May 2024"}, {"q": "Provision for % 50 crores. 2. What is the amount of preference dividend to be reduced from profit or loss for the year for calculating Basic Earnings Per Share?", "options": ["%15 crores", "21.75 crores", "13.25 crores", "Nothing, as no dividend has been declared by the entity 3. What amount will be shown as an inflow in respect of earnings from the associate in the statement of cash flows of U Ltd. for the year ended 31st March 20X3?"], "answer": 1, "context": "U Ltd. is engaged in mining and many other industries and prepares its financial statements following Indian Accounting Standards and follows April-March as their financial year. During the year 20X2-20X3, the company has faced some issues and for their solution seeks your professional advice. (i) ULtd. and F Ltd. are partners of a joint operation engaged in the business of mining precious metals. The entity uses a jointly owned drilling plant in its operations. During the year ended 31st March 20X3, an inspection was conducted by the government authorities in the mining fields. The inspection authorities concluded that adequate safety measures were not followed by the entity. As a consequence, a case was filed and a penalty of = 50 crores has been demanded from U Ltd. The legal counsel of the company has assessed the demand and opined that appeals may not be useful, and the appeal orders will be unfavourable to the joint arrangement. Out of = 50 crores (to be paid by U Ltd.), \u00a5 30 crore will be reimbursed by F Ltd. Later, as per the terms of the Joint Operation Agreement. At the year end, actual reimbursement was not received from F Ltd. (ii) U Ltd. has issued 10,00,000, 9% cumulative preference shares. The Company has arrears of % 15 crores of preference dividend as on 31st March 20X3, it includes current year arrears of % 1.75 crores. The Company did not declare any dividend for equity shareholders. Further U Ltd. has also issued certain optionally convertible debentures, which are outstanding as at the year end. (iii) On Ist January 20X3, U Ltd. acquired 30% of the shares of T Ltd. The investment was accounted for as an associate in U Ltd.'s consolidated financial statements. Both U Ltd. and T Ltd. have an accounting year end of 31st March 20X3. U Ltd. has no other investments in associates. Net profit for the year in T Ltd.'s income statement for the year ended 31st March 20X3 was \u00ae 0.23 crores. It declared and paid dividend of % 0.1 crore on Ist March 20X3. No other dividends were paid in the year. (iv) On Ist January, 20X3, U Ltd. also acquired a 60% stake in S Ltd. The cash consideration payable was 1 crore to be paid immediately, and % 1.21 crores after two years. The fair value of net assets of S Ltd. at acquisition date was % 3 crores. U Ltd. has calculated that its cost of capital is 10%. Non-controlling interest is measured at the proportionate share of identifiable net assets.", "explanation": "As per para 14(b) of Ind AS 33 \u2018Earnings per Share\u2019, the after-tax amount of preference dividends that is deducted from profit or loss is the after-tax amount of the preference dividends for cumulative preference shares required for the period, whether or not the dividends have been declared. The amount of preference dividends for the period does not include the amount of any preference dividends for cumulative preference shares paid or declared during the current period in respect of previous periods. In the given case, the amount of preference dividends of % 1.75 crore declared for the year ended 31st March 20X3 (i.e. the current period) is to be deducted from profit or loss for calculating EPS.", "case_num": 9, "source": "MTP May 2024"}, {"q": "Nothing, as no dividend has been declared by the entity 3. What amount will be shown as an inflow in respect of earnings from the associate in the statement of cash flows of U Ltd. for the year ended 31st March 20X3?", "options": ["20.020 crores", "20.026 crores", "0.030 crores", "0.046 crores 4. Calculate the amount of goodwill/gain on bargain purchase arising upon acquisition of S Ltd."], "answer": 2, "context": "U Ltd. is engaged in mining and many other industries and prepares its financial statements following Indian Accounting Standards and follows April-March as their financial year. During the year 20X2-20X3, the company has faced some issues and for their solution seeks your professional advice. (i) ULtd. and F Ltd. are partners of a joint operation engaged in the business of mining precious metals. The entity uses a jointly owned drilling plant in its operations. During the year ended 31st March 20X3, an inspection was conducted by the government authorities in the mining fields. The inspection authorities concluded that adequate safety measures were not followed by the entity. As a consequence, a case was filed and a penalty of = 50 crores has been demanded from U Ltd. The legal counsel of the company has assessed the demand and opined that appeals may not be useful, and the appeal orders will be unfavourable to the joint arrangement. Out of = 50 crores (to be paid by U Ltd.), \u00a5 30 crore will be reimbursed by F Ltd. Later, as per the terms of the Joint Operation Agreement. At the year end, actual reimbursement was not received from F Ltd. (ii) U Ltd. has issued 10,00,000, 9% cumulative preference shares. The Company has arrears of % 15 crores of preference dividend as on 31st March 20X3, it includes current year arrears of % 1.75 crores. The Company did not declare any dividend for equity shareholders. Further U Ltd. has also issued certain optionally convertible debentures, which are outstanding as at the year end. (iii) On Ist January 20X3, U Ltd. acquired 30% of the shares of T Ltd. The investment was accounted for as an associate in U Ltd.'s consolidated financial statements. Both U Ltd. and T Ltd. have an accounting year end of 31st March 20X3. U Ltd. has no other investments in associates. Net profit for the year in T Ltd.'s income statement for the year ended 31st March 20X3 was \u00ae 0.23 crores. It declared and paid dividend of % 0.1 crore on Ist March 20X3. No other dividends were paid in the year. (iv) On Ist January, 20X3, U Ltd. also acquired a 60% stake in S Ltd. The cash consideration payable was 1 crore to be paid immediately, and % 1.21 crores after two years. The fair value of net assets of S Ltd. at acquisition date was % 3 crores. U Ltd. has calculated that its cost of capital is 10%. Non-controlling interest is measured at the proportionate share of identifiable net assets.", "explanation": "As per para 37 of Ind AS 7, when accounting for an investment in an associate, a joint venture or a subsidiary accounted for by use of the equity or cost method, an investor restricts its reporting in the statement of cash flows to the cash flows between itself and the investee, for example, to dividends and advances. Accordingly, Dividend paid by associate T Ltd. = % 0.10 crores U Ltd.'s share of dividend 30% x 70.10 lakhs == % 0.030 crores This is the amount that should appear in the statement of cash flows of U Ltd. as this is the share of U Ltd.'s dividend from the associate T Ltd.", "case_num": 9, "source": "MTP May 2024"}, {"q": "046 crores 4. Calculate the amount of goodwill/gain on bargain purchase arising upon acquisition of S Ltd.", "options": ["%1 crore gain on bargain purchase", "% 80 lakh gain on bargain purchase", "% 20 lakhs goodwill", "% 41 lakhs goodwill"], "answer": 2, "context": "U Ltd. is engaged in mining and many other industries and prepares its financial statements following Indian Accounting Standards and follows April-March as their financial year. During the year 20X2-20X3, the company has faced some issues and for their solution seeks your professional advice. (i) ULtd. and F Ltd. are partners of a joint operation engaged in the business of mining precious metals. The entity uses a jointly owned drilling plant in its operations. During the year ended 31st March 20X3, an inspection was conducted by the government authorities in the mining fields. The inspection authorities concluded that adequate safety measures were not followed by the entity. As a consequence, a case was filed and a penalty of = 50 crores has been demanded from U Ltd. The legal counsel of the company has assessed the demand and opined that appeals may not be useful, and the appeal orders will be unfavourable to the joint arrangement. Out of = 50 crores (to be paid by U Ltd.), \u00a5 30 crore will be reimbursed by F Ltd. Later, as per the terms of the Joint Operation Agreement. At the year end, actual reimbursement was not received from F Ltd. (ii) U Ltd. has issued 10,00,000, 9% cumulative preference shares. The Company has arrears of % 15 crores of preference dividend as on 31st March 20X3, it includes current year arrears of % 1.75 crores. The Company did not declare any dividend for equity shareholders. Further U Ltd. has also issued certain optionally convertible debentures, which are outstanding as at the year end. (iii) On Ist January 20X3, U Ltd. acquired 30% of the shares of T Ltd. The investment was accounted for as an associate in U Ltd.'s consolidated financial statements. Both U Ltd. and T Ltd. have an accounting year end of 31st March 20X3. U Ltd. has no other investments in associates. Net profit for the year in T Ltd.'s income statement for the year ended 31st March 20X3 was \u00ae 0.23 crores. It declared and paid dividend of % 0.1 crore on Ist March 20X3. No other dividends were paid in the year. (iv) On Ist January, 20X3, U Ltd. also acquired a 60% stake in S Ltd. The cash consideration payable was 1 crore to be paid immediately, and % 1.21 crores after two years. The fair value of net assets of S Ltd. at acquisition date was % 3 crores. U Ltd. has calculated that its cost of capital is 10%. Non-controlling interest is measured at the proportionate share of identifiable net assets.", "explanation": "Total consideration paid: Cash ler PV of deferred consideration (1.21 x 0.826) ler 2cr NCI by Proportionate Share Method 3 cr x 40 %=1.20 cr Calculation of Goodwill: Proportionate Share Method (% in crore) Net Identifiable Assets Dr. 3.00 Goodwill (Balancing figure) Dr. 0.2 To Consideration payable 2.00 To Non-controlling Interest 1.20", "case_num": 9, "source": "MTP May 2024"}, {"q": "With respect to H Ltd. state whether the error should be reported in the Ind AS financial statements and how to rectify it.", "options": ["H Ltd. shall report the impact of the error as a correction to Statement of Profit and Loss for the comparative period i.e., the year ended 31st March, 20X3.", "The correction shall be reflected in a reconciliation as at the end of the first Ind AS reporting period i.e., as at 31st March, 20X3.", "The impact of the correction is significant and it shall be amortized on a rational and systematic basis in the first two periods of Ind AS reporting i.e., years ended 31st March, 20X3 and 31st March, 20X4.", "The first Ind AS financial statements shall distinguish the correction of errors from changes in accounting policies and reported as part of the reconciliations as at 1st April, 20X2. 2. How many performance obligations G Ltd. has, with respect to the contract with the customer to transfer software license?"], "answer": 3, "context": "G Ltd. is a multi-national company and prepares and presents its financial statements following Indian Accounting Standards as its securities are listed on National Stock Exchange. G Ltd. has a number of business segments. (i) H Ltd. is one of the recently acquired Indian subsidiaries of G Ltd. It has to adopt Ind AS for the first time as at 31st March, 20X4, with 1st April, 20X2 as the date of transition. As at 31st March, 20X2, the value of raw material inventories was incorrectly reported due to an error. The amounts are significant. (ii) G Ltd. is also engaged in software development. It enters into a contract with a customer to transfer a software license, perform an installation service and provide unspecified software updates and technical support (online and telephone) for a two-year period. G Ltd. sells the license, installation service and technical support separately. The installation service includes changing the web screen for each type of user (for example, marketing, inventory management and information technology). The installation service is routinely performed by other entities and does not significantly modify the software. The software remains functional without the updates and the technical support. (iii) G Ltd. sells a 20% interest in a wholly owned subsidiary K Ltd. to outside investors for % 100 lakh in cash. The carrying value of K Ltd.'s net assets is % 300 lakh, including goodwill of & 65 lakh from the subsidiary's initial acquisition.", "explanation": "Refer para 26 of Ind AS 101 which states that if an entity becomes aware of errors made under previous GAAP, the reconciliations required by paragraph 24(a)and(b) shall distinguish the correlation of those errors from changes in accounting policies.", "case_num": 10, "source": "MTP May 2024"}, {"q": "The first Ind AS financial statements shall distinguish the correction of errors from changes in accounting policies and reported as part of the reconciliations as at 1st April, 20X2. 2. How many performance obligations G Ltd. has, with respect to the contract with the customer to transfer software license?", "options": ["4 performance obligations", "3 performance obligations", "2 performance obligations", "1 performance obligation 3. What is the amount of gain on sale of interest in subsidiary K Ltd.?"], "answer": 0, "context": "G Ltd. is a multi-national company and prepares and presents its financial statements following Indian Accounting Standards as its securities are listed on National Stock Exchange. G Ltd. has a number of business segments. (i) H Ltd. is one of the recently acquired Indian subsidiaries of G Ltd. It has to adopt Ind AS for the first time as at 31st March, 20X4, with 1st April, 20X2 as the date of transition. As at 31st March, 20X2, the value of raw material inventories was incorrectly reported due to an error. The amounts are significant. (ii) G Ltd. is also engaged in software development. It enters into a contract with a customer to transfer a software license, perform an installation service and provide unspecified software updates and technical support (online and telephone) for a two-year period. G Ltd. sells the license, installation service and technical support separately. The installation service includes changing the web screen for each type of user (for example, marketing, inventory management and information technology). The installation service is routinely performed by other entities and does not significantly modify the software. The software remains functional without the updates and the technical support. (iii) G Ltd. sells a 20% interest in a wholly owned subsidiary K Ltd. to outside investors for % 100 lakh in cash. The carrying value of K Ltd.'s net assets is % 300 lakh, including goodwill of & 65 lakh from the subsidiary's initial acquisition.", "explanation": "The entity assesses the goods and services promised to the customer to determine which goods and services are distinct. The entity observes that the software is delivered before the other goods and services and remains functional without the updates and the technical support. Thus, the entity concludes that the customer can benefit from each of the goods and services either on their own or together with the other goods and services that are readily available. The entity also considers the factors of Ind AS 115 and determines that the promise to transfer each goods and service to the customer is separately identifiable from each of the other promises. In particular, the entity observes that the installation service does not significantly modify or customize the software itself and, as such, the software and the installation service are separate outputs promised by the entity instead of inputs used to produce a combined output. On the basis of this assessment, the entity identifies four performance obligations in the contract for the following goods or services: e The software license e =Aninstallation service e Software updates e Technical support", "case_num": 10, "source": "MTP May 2024"}, {"q": "1 performance obligation 3. What is the amount of gain on sale of interest in subsidiary K Ltd.?", "options": ["%100 lakhs", "% 60 lakhs", "%53 lakhs", "% 40 lakhs"], "answer": 3, "context": "G Ltd. is a multi-national company and prepares and presents its financial statements following Indian Accounting Standards as its securities are listed on National Stock Exchange. G Ltd. has a number of business segments. (i) H Ltd. is one of the recently acquired Indian subsidiaries of G Ltd. It has to adopt Ind AS for the first time as at 31st March, 20X4, with 1st April, 20X2 as the date of transition. As at 31st March, 20X2, the value of raw material inventories was incorrectly reported due to an error. The amounts are significant. (ii) G Ltd. is also engaged in software development. It enters into a contract with a customer to transfer a software license, perform an installation service and provide unspecified software updates and technical support (online and telephone) for a two-year period. G Ltd. sells the license, installation service and technical support separately. The installation service includes changing the web screen for each type of user (for example, marketing, inventory management and information technology). The installation service is routinely performed by other entities and does not significantly modify the software. The software remains functional without the updates and the technical support. (iii) G Ltd. sells a 20% interest in a wholly owned subsidiary K Ltd. to outside investors for % 100 lakh in cash. The carrying value of K Ltd.'s net assets is % 300 lakh, including goodwill of & 65 lakh from the subsidiary's initial acquisition.", "explanation": "% in lakhs Dr. Cr. Cash Dr. 100 To non-controlling interest (20% x 300 lakh) 60 To Other Equity (Gain on sale of interest in subsidiary) 40 As per para B96 of Ind AS 110, where proportion of the equity of NCI changes, then group shall adjust controlling and non-controlling interest and any difference between amount by which NCI (% 60 lakhs) is adjusted and fair value of consideration received (% 100 lakh) to be attributed to parent in other equity i.e., = 40 lakh.", "case_num": 10, "source": "MTP May 2024"}, {"q": "How the long-term loan from State Bank has to be classified in the financials for the year ended 31st March 20X3 in case ABC Ltd. has not negotiated with the bank for rectification of breach?", "options": ["Other current liabilities", "Current financial liability", "Non-current financial liability", "Other non-current liability 2. After negotiation with State Bank, how the long-term loan has to be classified in the financials for the year ended 31st March 20X3?"], "answer": 1, "context": "ABC Ltd. is a diversified business group operating in multiple business segments across different parts of the world. It maintains its books of accounts and publishes its annual financial statements under Indian Accounting Standards. The finance team has been working on closing the books of accounts and generating financial statements for the year ended 31st March 20X3 and are facing issues in the following transactions while finalization of financial statements: (i) One of the businesses of ABC Ltd. is of manufacturing sugar and chemicals. The Company has taken a term loan for % 5 crores from State Bank to buy certain plant and machinery during the year ended 31st March 20X2. The loan is repayable over a period of 5 years. The terms and conditions of the loan agreement requires the company to maintain a current ratio of 1.33: 1 and debt-equity ratio of 1: 2. If these loan covenants fall below this level, then the bank has a right to recall the entire loan. The loan outstanding as on 31st March, 20X3 was & 4.25 crores. The current ratio of ABC Ltd. was 1:1 and debt equity ratio was 0.5: 2. State Bank sent a notice on 5 April 20X3 demanding repayment of loan, on account of breach of terms of the loan agreement. The financials were signed on 10th May, 20X3. On receiving the notice, the CFO of ABC Ltd. negotiated with the bank and ensured to rectify the breach. As a result, on 25th April, 20X3, the Bank has agreed not to recall the loan and allowed the Company to achieve the contracted current and debt-equity ratio by 20X5. (ii) ABC Ltd. has inventory of raw material Y of 10,000 units as at 31st March, 20X4 with a carrying amount of % 100 each. The current market value of that raw material is = 95 each. ABC Ltd. will use the raw material to manufacture a component for a customer. The conversion cost for making the finished goods would be % 130 each. ABC Ltd. estimates costs to completion and sale of % 50 each and a selling price for the component is estimated to be % 290 each. (iii) ABC Ltd. sold a machinery Z for = 900 thousand to a new customer. To get into long term relationship with the customer, the terms of sale also include after sales service to be provided for next three years free of cost. The company also sells the sales service contract separately where the customer buys it after the initial warranty period at = 100 thousand.", "case_num": 11, "source": "MTP May 2024"}, {"q": "Other non-current liability 2. After negotiation with State Bank, how the long-term loan has to be classified in the financials for the year ended 31st March 20X3?", "options": ["Other current liabilities", "Current financial liability", "Non-current financial liability", "Other non-current financial liability 3. At what value the raw material Y be measured in the books of ABC Ltd. as per applicable Ind AS?"], "answer": 2, "context": "ABC Ltd. is a diversified business group operating in multiple business segments across different parts of the world. It maintains its books of accounts and publishes its annual financial statements under Indian Accounting Standards. The finance team has been working on closing the books of accounts and generating financial statements for the year ended 31st March 20X3 and are facing issues in the following transactions while finalization of financial statements: (i) One of the businesses of ABC Ltd. is of manufacturing sugar and chemicals. The Company has taken a term loan for % 5 crores from State Bank to buy certain plant and machinery during the year ended 31st March 20X2. The loan is repayable over a period of 5 years. The terms and conditions of the loan agreement requires the company to maintain a current ratio of 1.33: 1 and debt-equity ratio of 1: 2. If these loan covenants fall below this level, then the bank has a right to recall the entire loan. The loan outstanding as on 31st March, 20X3 was & 4.25 crores. The current ratio of ABC Ltd. was 1:1 and debt equity ratio was 0.5: 2. State Bank sent a notice on 5 April 20X3 demanding repayment of loan, on account of breach of terms of the loan agreement. The financials were signed on 10th May, 20X3. On receiving the notice, the CFO of ABC Ltd. negotiated with the bank and ensured to rectify the breach. As a result, on 25th April, 20X3, the Bank has agreed not to recall the loan and allowed the Company to achieve the contracted current and debt-equity ratio by 20X5. (ii) ABC Ltd. has inventory of raw material Y of 10,000 units as at 31st March, 20X4 with a carrying amount of % 100 each. The current market value of that raw material is = 95 each. ABC Ltd. will use the raw material to manufacture a component for a customer. The conversion cost for making the finished goods would be % 130 each. ABC Ltd. estimates costs to completion and sale of % 50 each and a selling price for the component is estimated to be % 290 each. (iii) ABC Ltd. sold a machinery Z for = 900 thousand to a new customer. To get into long term relationship with the customer, the terms of sale also include after sales service to be provided for next three years free of cost. The company also sells the sales service contract separately where the customer buys it after the initial warranty period at = 100 thousand.", "explanation": "Reason for 1 & 2: Para 74 of Ind AS 1 \u201cPresentation of Financial Statements\" states that when an entity breaches a provision of a long-term loan arrangement on or before the end of the reporting period with the effect that the liability becomes payable on demand, it classifies the liability as current, even if the lender agreed, after the reporting period and before the approval of the financial statements for issue, not to demand payment as a consequence of the breach. An entity classifies the liability as current because, at the end of the reporting period, it does not have an unconditional right to defer its settlement for at least 12 months after that date.", "case_num": 11, "source": "MTP May 2024"}, {"q": "Other non-current financial liability 3. At what value the raw material Y be measured in the books of ABC Ltd. as per applicable Ind AS?", "options": ["950 thousand", "21,100 thousand", "% 1,000 thousand", "21,600 thousand 4. How should the revenue be recognised in the books of account for the sale of machinery Z?"], "answer": 2, "context": "ABC Ltd. is a diversified business group operating in multiple business segments across different parts of the world. It maintains its books of accounts and publishes its annual financial statements under Indian Accounting Standards. The finance team has been working on closing the books of accounts and generating financial statements for the year ended 31st March 20X3 and are facing issues in the following transactions while finalization of financial statements: (i) One of the businesses of ABC Ltd. is of manufacturing sugar and chemicals. The Company has taken a term loan for % 5 crores from State Bank to buy certain plant and machinery during the year ended 31st March 20X2. The loan is repayable over a period of 5 years. The terms and conditions of the loan agreement requires the company to maintain a current ratio of 1.33: 1 and debt-equity ratio of 1: 2. If these loan covenants fall below this level, then the bank has a right to recall the entire loan. The loan outstanding as on 31st March, 20X3 was & 4.25 crores. The current ratio of ABC Ltd. was 1:1 and debt equity ratio was 0.5: 2. State Bank sent a notice on 5 April 20X3 demanding repayment of loan, on account of breach of terms of the loan agreement. The financials were signed on 10th May, 20X3. On receiving the notice, the CFO of ABC Ltd. negotiated with the bank and ensured to rectify the breach. As a result, on 25th April, 20X3, the Bank has agreed not to recall the loan and allowed the Company to achieve the contracted current and debt-equity ratio by 20X5. (ii) ABC Ltd. has inventory of raw material Y of 10,000 units as at 31st March, 20X4 with a carrying amount of % 100 each. The current market value of that raw material is = 95 each. ABC Ltd. will use the raw material to manufacture a component for a customer. The conversion cost for making the finished goods would be % 130 each. ABC Ltd. estimates costs to completion and sale of % 50 each and a selling price for the component is estimated to be % 290 each. (iii) ABC Ltd. sold a machinery Z for = 900 thousand to a new customer. To get into long term relationship with the customer, the terms of sale also include after sales service to be provided for next three years free of cost. The company also sells the sales service contract separately where the customer buys it after the initial warranty period at = 100 thousand.", "explanation": "As per para 32 of Ind AS 2, materials and other supplies held for use in the production of inventories are not written down below cost if the finished products in which they will be incorporated are expected to be sold at or above cost. However, when a decline in the price of materials indicates that the cost of the finished products exceeds net realisable value, the materials are written down to net realisable value. In such circumstances, the replacement cost of the materials may be the best available measure of their net realisable value. Here, the NRV of each unit of finished goods is % 240 (i.e. = 290 - % 50), which is more than the cost of finished goods i.e. % 230 (i.e. \u00a5 100 + % 130). Hence the raw material will be valued at cost i.e. = 100 each. Thus, the total cost of raw material will be 10,00,000 (i.e. = 10,000 x %100).", "case_num": 11, "source": "MTP May 2024"}, {"q": "21,600 thousand 4. How should the revenue be recognised in the books of account for the sale of machinery Z?", "options": ["900 thousand is to be recognised as revenue in the year of sale.", "% 900 thousand is to be recognised at the end of three years after sale.", "900 thousand is to be recognised in the year of sale and % 100 thousand to be spread over next three years.", "% 810 thousand is to be recognised in the year of sale and % 90 thousand to be spread over next three years."], "answer": 3, "context": "ABC Ltd. is a diversified business group operating in multiple business segments across different parts of the world. It maintains its books of accounts and publishes its annual financial statements under Indian Accounting Standards. The finance team has been working on closing the books of accounts and generating financial statements for the year ended 31st March 20X3 and are facing issues in the following transactions while finalization of financial statements: (i) One of the businesses of ABC Ltd. is of manufacturing sugar and chemicals. The Company has taken a term loan for % 5 crores from State Bank to buy certain plant and machinery during the year ended 31st March 20X2. The loan is repayable over a period of 5 years. The terms and conditions of the loan agreement requires the company to maintain a current ratio of 1.33: 1 and debt-equity ratio of 1: 2. If these loan covenants fall below this level, then the bank has a right to recall the entire loan. The loan outstanding as on 31st March, 20X3 was & 4.25 crores. The current ratio of ABC Ltd. was 1:1 and debt equity ratio was 0.5: 2. State Bank sent a notice on 5 April 20X3 demanding repayment of loan, on account of breach of terms of the loan agreement. The financials were signed on 10th May, 20X3. On receiving the notice, the CFO of ABC Ltd. negotiated with the bank and ensured to rectify the breach. As a result, on 25th April, 20X3, the Bank has agreed not to recall the loan and allowed the Company to achieve the contracted current and debt-equity ratio by 20X5. (ii) ABC Ltd. has inventory of raw material Y of 10,000 units as at 31st March, 20X4 with a carrying amount of % 100 each. The current market value of that raw material is = 95 each. ABC Ltd. will use the raw material to manufacture a component for a customer. The conversion cost for making the finished goods would be % 130 each. ABC Ltd. estimates costs to completion and sale of % 50 each and a selling price for the component is estimated to be % 290 each. (iii) ABC Ltd. sold a machinery Z for = 900 thousand to a new customer. To get into long term relationship with the customer, the terms of sale also include after sales service to be provided for next three years free of cost. The company also sells the sales service contract separately where the customer buys it after the initial warranty period at = 100 thousand.", "explanation": "As per para B29 of Ind AS 115, if a customer has the option to purchase a warranty separately, the warranty is a distinct service because the entity promises to provide the service to the customer in addition to the product that has the functionality described in the contract. In those circumstances, an entity shall account for the promised warranty as a performance obligation and allocate a portion of the transaction price to that performance obligation based on stand- alone selling prices as follows: Total value after including sales service = % 900 thousand + = 100 thousand = % 1,000 thousand Sales price of machinery recognized immediately = % 900 thousand x (\u00ae 900/1,000) = % 810 thousand Sales service recognized over three years = % 900 thousand x (\u00ae 100/1,000) = % 90 thousand", "case_num": 11, "source": "MTP May 2024"}, {"q": "Compute the value of Specialty chemical division's Goodwill at the date of classification after re-measurement.", "options": ["27.3 million", "10 Million", "Nil", "8 million 2. Calculate the closing balance of Specialty chemical division's asset Property, Plant and Equipment at the period end."], "answer": 2, "context": "DEF Ltd. is a globally diversified business conglomerate with operations spanning across various business sectors worldwide. The company adheres to Indian Accounting Standards for maintaining its financial records and annually releases its financial statements. As the finance team progresses towards finalizing the financial statements for the fiscal year ending on 31st March 20X3, the team is stuck up in the accounting of the following transactions: (i) On 1st June 20X2, DEF Ltd. decided to dispose of the business and current and non-current assets of one of its divisions related to specialty chemicals business which it had acquired several years ago. This disposal does not involve DEF Ltd. withdrawing from a particular market sector. The carrying values on Ist June 20X2 of the assets to be disposed of were as follows: Particulars % in Million Goodwill 10.0 Property, Plant and Equipment 20.0 Patents and trademarks 8.0 Inventories 15.0 Trade Receivables 10.0 None of the assets of the business had suffered impairment as at Ist June 20X2. At that date the inventories and trade receivables of the business were already stated at no more than their recoverable amounts. DEF Ltd. offered the business for sale at a price of % 46.5 million, which was considered to be reasonably achievable. DEF Ltd. estimated that the direct costs of selling the business would be % 5,00,000. These estimates have not changed since 1st June 20X2 and DEF Ltd. estimates that the business will be sold by 31st March 20X3 at the latest. (ii). The government provided DEF Ltd. with a grant of % 21 million to assist it inthe development of the factory. This grant was provided in two parts: (1) % 6 million of the grant was a payment by the government as an inducement to DEF Ltd. to begin developing the factory. No conditions were attached to this part of the grant. (2) %15 million of the grant related to the construction of the factory at a cost of % 60 million. The % 60 million is depreciable over the estimated 40-year useful life of the factory without adjustment of grant amount from the cost of the factory.", "case_num": 12, "source": "MTP May 2024"}, {"q": "8 million 2. Calculate the closing balance of Specialty chemical division's asset Property, Plant and Equipment at the period end.", "options": ["21 million", "17.36 million", "%6 million", "215 million 3. What amount of grant out of % 15 million with respect to construction of factory be transferred to profit and loss account in the year 20X3-20X4?"], "answer": 3, "context": "DEF Ltd. is a globally diversified business conglomerate with operations spanning across various business sectors worldwide. The company adheres to Indian Accounting Standards for maintaining its financial records and annually releases its financial statements. As the finance team progresses towards finalizing the financial statements for the fiscal year ending on 31st March 20X3, the team is stuck up in the accounting of the following transactions: (i) On 1st June 20X2, DEF Ltd. decided to dispose of the business and current and non-current assets of one of its divisions related to specialty chemicals business which it had acquired several years ago. This disposal does not involve DEF Ltd. withdrawing from a particular market sector. The carrying values on Ist June 20X2 of the assets to be disposed of were as follows: Particulars % in Million Goodwill 10.0 Property, Plant and Equipment 20.0 Patents and trademarks 8.0 Inventories 15.0 Trade Receivables 10.0 None of the assets of the business had suffered impairment as at Ist June 20X2. At that date the inventories and trade receivables of the business were already stated at no more than their recoverable amounts. DEF Ltd. offered the business for sale at a price of % 46.5 million, which was considered to be reasonably achievable. DEF Ltd. estimated that the direct costs of selling the business would be % 5,00,000. These estimates have not changed since 1st June 20X2 and DEF Ltd. estimates that the business will be sold by 31st March 20X3 at the latest. (ii). The government provided DEF Ltd. with a grant of % 21 million to assist it inthe development of the factory. This grant was provided in two parts: (1) % 6 million of the grant was a payment by the government as an inducement to DEF Ltd. to begin developing the factory. No conditions were attached to this part of the grant. (2) %15 million of the grant related to the construction of the factory at a cost of % 60 million. The % 60 million is depreciable over the estimated 40-year useful life of the factory without adjustment of grant amount from the cost of the factory.", "explanation": "Reason for1&2 Pursuant to the provisions of Ind AS 105 \u2018Non-current Assets Held for Sale and Discontinued Operations\u2019 the business would be regarded as held for sale from Ist June, 20X2. The held for sale criteria apply because the business is being actively marketed at a reasonable price and the sale is expected to be completed within one year of the date of classification. Given this classification, Ind AS 105 requires that the assets be separately classified under current assets in the balance sheet. No further depreciation would be charged on these assets. The assets will be measured at the lower of their current carrying amounts at the date of classification and their fair value less costs to sell. In this case, the total carrying amount after re- measurement will be % 46 million (46-5 million - 0-5 million). The impairment loss of % 17 million (% 63 million - % 46 million) will first be allocated to goodwill taking its carrying amount to nil. None of the remaining impairment loss will be allocated to inventories or trade receivables since their recoverable amounts are at least equal to their existing carrying amounts. The remaining impairment loss of % 7 million (% 17 million - % 10 million) will be allocated to the property, plant and equipment and the patents on a pro-rata basis. The closing carrying amounts of the property, plant and equipment and the patents will be % 15 million and = 6 million respectively.", "case_num": 12, "source": "MTP May 2024"}, {"q": "215 million 3. What amount of grant out of % 15 million with respect to construction of factory be transferred to profit and loss account in the year 20X3-20X4?", "options": ["15 million", "% 0.375 million", "21.5 million", "0.125 million 4. What would be the treatment of grant of % 6 million received from the government as an inducement to DEF Ltd. to begin developing the factory?"], "answer": 3, "context": "DEF Ltd. is a globally diversified business conglomerate with operations spanning across various business sectors worldwide. The company adheres to Indian Accounting Standards for maintaining its financial records and annually releases its financial statements. As the finance team progresses towards finalizing the financial statements for the fiscal year ending on 31st March 20X3, the team is stuck up in the accounting of the following transactions: (i) On 1st June 20X2, DEF Ltd. decided to dispose of the business and current and non-current assets of one of its divisions related to specialty chemicals business which it had acquired several years ago. This disposal does not involve DEF Ltd. withdrawing from a particular market sector. The carrying values on Ist June 20X2 of the assets to be disposed of were as follows: Particulars % in Million Goodwill 10.0 Property, Plant and Equipment 20.0 Patents and trademarks 8.0 Inventories 15.0 Trade Receivables 10.0 None of the assets of the business had suffered impairment as at Ist June 20X2. At that date the inventories and trade receivables of the business were already stated at no more than their recoverable amounts. DEF Ltd. offered the business for sale at a price of % 46.5 million, which was considered to be reasonably achievable. DEF Ltd. estimated that the direct costs of selling the business would be % 5,00,000. These estimates have not changed since 1st June 20X2 and DEF Ltd. estimates that the business will be sold by 31st March 20X3 at the latest. (ii). The government provided DEF Ltd. with a grant of % 21 million to assist it inthe development of the factory. This grant was provided in two parts: (1) % 6 million of the grant was a payment by the government as an inducement to DEF Ltd. to begin developing the factory. No conditions were attached to this part of the grant. (2) %15 million of the grant related to the construction of the factory at a cost of % 60 million. The % 60 million is depreciable over the estimated 40-year useful life of the factory without adjustment of grant amount from the cost of the factory.", "explanation": "The grant of % 15 million in respect of the plant and equipment should be recognized over the 40-year life of the factory. Since the amount of grant will be considered as deferred credit, it would be released to the Statement of Profit and Loss over the same 40-year period as the asset is depreciated. So, the amount included in the Statement of Profit and Loss for the current year 20X3-20X4 would be % 0.125 million (15 million x 1/40).", "case_num": 12, "source": "MTP May 2024"}, {"q": "125 million 4. What would be the treatment of grant of % 6 million received from the government as an inducement to DEF Ltd. to begin developing the factory?", "options": ["Grant relating to an inducement to begin developing the factory can be recognized immediately in the Statement of Profit or Loss.", "0.15 million amount is to be credited each year in the income statement over 40 year period.", "21.2 million amount is to be credited each year in the income statement over 40 year period.", "Net off the grant received against the cost of the asset and depreciate the net figure over its useful economic life."], "answer": 0, "context": "DEF Ltd. is a globally diversified business conglomerate with operations spanning across various business sectors worldwide. The company adheres to Indian Accounting Standards for maintaining its financial records and annually releases its financial statements. As the finance team progresses towards finalizing the financial statements for the fiscal year ending on 31st March 20X3, the team is stuck up in the accounting of the following transactions: (i) On 1st June 20X2, DEF Ltd. decided to dispose of the business and current and non-current assets of one of its divisions related to specialty chemicals business which it had acquired several years ago. This disposal does not involve DEF Ltd. withdrawing from a particular market sector. The carrying values on Ist June 20X2 of the assets to be disposed of were as follows: Particulars % in Million Goodwill 10.0 Property, Plant and Equipment 20.0 Patents and trademarks 8.0 Inventories 15.0 Trade Receivables 10.0 None of the assets of the business had suffered impairment as at Ist June 20X2. At that date the inventories and trade receivables of the business were already stated at no more than their recoverable amounts. DEF Ltd. offered the business for sale at a price of % 46.5 million, which was considered to be reasonably achievable. DEF Ltd. estimated that the direct costs of selling the business would be % 5,00,000. These estimates have not changed since 1st June 20X2 and DEF Ltd. estimates that the business will be sold by 31st March 20X3 at the latest. (ii). The government provided DEF Ltd. with a grant of % 21 million to assist it inthe development of the factory. This grant was provided in two parts: (1) % 6 million of the grant was a payment by the government as an inducement to DEF Ltd. to begin developing the factory. No conditions were attached to this part of the grant. (2) %15 million of the grant related to the construction of the factory at a cost of % 60 million. The % 60 million is depreciable over the estimated 40-year useful life of the factory without adjustment of grant amount from the cost of the factory.", "explanation": "Accounting for government grants is dealt with by Ind AS 20 \u2018Accounting for Government Grants and Disclosure of Government Assistance\u2019. The basic principle of Ind AS 20 is that grants should be recognized as income over the periods necessary to match them with the related costs for which they are intended to compensate, on a systematic basis. That part of the grant relating to an inducement to begin developing the factory (% 6 million) was received without any conditions and so can be recognized immediately in the Statement of Profit or Loss.", "case_num": 12, "source": "MTP May 2024"}, {"q": "What would be the initial measurement of financial instruments as subscription of loan notes in Z Ltd.?", "options": ["% 40 million", "% 37.782 million", "%38.4 million", "36 million 2. What would be the closing balance of financial instruments (as subscription of loan notes in Z Ltd.) as on 31st March 20X2?"], "answer": 3, "context": "HIJ Ltd. is a globally diversified business conglomerate with operations spanning multiple business segments across various regions worldwide. For maintaining its financial records, the company follows Indian Accounting Standards. As the finance team diligently finalizes the books of accounts and prepares the financial statements for the financial year ending on 31st March 20X2, it requires insights and accounting suggestions on the following transactions: (i) On 1st October 20X1, HIJ Ltd. subscribed for 40 million, % 1 loan notes in Z Ltd. The loan notes were issued at 90 paise and were redeemable at % 1.20 on 30th September 20X6. Interest is payable on 30th September in arrears at 4% of par value. This represents an effective annual rate of return for HIJ Ltd. of 9.9%. HIJ Ltd.'s intention is to hold the loan notes until redemption. (ii) On Ist April 20X1, HIJ Ltd. commenced joint construction of a property with G Ltd. For this purpose, an agreement has been entered into that provides for joint operation and ownership of the property. All the ongoing expenditure, comprising maintenance plus borrowing costs, is to be shared equally. The construction was completed on 30th September 20X1 and utilisation of the property started on 1st January 20X2 at which time the estimated useful life of the same was estimated to be 20 years. Total cost of the construction of the property was % 40 crores. Besides internal accruals, the cost was partly funded by way of loan of % 10 crores taken on 1st January 20X1.The loan carries interest at an annual rate of 10% with interest payable at the end of year on 31st December each year. The company has spent % 4,00,000 on the maintenance of such property. The company has recorded the entire amount paid as investment in Joint Venture in the books of accounts. Suggest the suitable accounting treatment of the above transaction as per applicable Ind AS.", "case_num": 13, "source": "MTP May 2024"}, {"q": "36 million 2. What would be the closing balance of financial instruments (as subscription of loan notes in Z Ltd.) as on 31st March 20X2?", "options": ["37.6 million", "% 34.218 million", "237.782 million", "36.182 million 3. With respect to point (ii), what is the nature of the agreement?"], "answer": 2, "context": "HIJ Ltd. is a globally diversified business conglomerate with operations spanning multiple business segments across various regions worldwide. For maintaining its financial records, the  1 loan notes in Z Ltd. The loan notes were issued at 90 paise and were redeemable at % 1.20 on 30th September 20X6. Interest is payable on 30th September in arrears at 4% of par value. This represents an effective annual rate of return for HIJ Ltd. of 9.9%. HIJ Ltd.'s intention is to hold the loan notes until redemption. (ii) On Ist April 20X1, HIJ Ltd. commenced joint construction of a property with G Ltd. For this purpose, an agreement has been entered into that provides for joint operation and ownership of the property. All the ongoing expenditure, comprising maintenance plus borrowing costs, is to be shared equally. The construction was completed on 30th September 20X1 and utilisation of the property started on 1st January 20X2 at which time the estimated useful life of the same was estimated to be 20 years. Total cost of the construction of the property was % 40 crores. Besides internal accruals, the cost was partly funded by way of loan of % 10 crores taken on 1st January 20X1.The loan carries interest at an annual rate of 10% with interest payable at the end of year on 31st December each year. The company has spent % 4,00,000 on the maintenance of such property. The company has recorded the entire amount paid as investment in Joint Venture in the books of accounts. Suggest the suitable accounting treatment of the above transaction as per applicable Ind AS.", "explanation": "Reason for 3,4&5 As provided in \u201cInd AS 111 Joint Arrangements\u2019 this is a joint arrangement because two or more parties have joint control of the property under a contractual arrangement. The arrangement will be regarded as a joint operation because HIJ Ltd. and G Ltd. have rights to the assets and obligations for the liabilities of this joint arrangement. This means that the company and the other investor will each recognise 50% of the cost of constructing the asset in property, plant and equipment. The borrowing cost incurred on constructing the property should under the princ
